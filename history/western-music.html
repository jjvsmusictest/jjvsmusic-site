 {q:"葛利果聖歌（Gregorian Chant）為單音音樂、無伴奏、以拉丁文歌唱、節奏自由。",ans:true,e:"✅ 正確！葛利果聖歌的四大特徵：單音齊唱、自由節奏、拉丁文、無樂器伴奏。"},
 {q:"葛利果聖歌之所以稱為「葛利果」，是因為教宗葛利果一世「親自作曲」每一首聖歌。",ans:false,e:"❌ 錯！葛利果一世是「彙整、編纂」全教會聖歌，並非每首皆為其親自所作。"},
 {q:"中世紀後期最重要的記譜貢獻者是桂多·達瑞佐（Guido d'Arezzo），他發明了四線譜。",ans:true,e:"✅ 正確！桂多·達瑞佐約1025年發明四線譜及唱名（Ut-Re-Mi-Fa-Sol-La），徹底改變音樂傳遞。"},
 {q:"「奧爾加農（Organum）」是最早的複音音樂形式，最初僅是平行四度或五度。",ans:true,e:"✅ 正確！奧爾加農是西方複音音樂起源，最早為「平行奧爾加農」（平行五/四度）。"},
 {q:"聖母院樂派的代表人物是雷奧南（Léonin）與培洛廷（Pérotin），活躍於 12-13 世紀的巴黎。",ans:true,e:"✅ 正確！雷奧南著《大奧爾加農集》（Magnus Liber Organi），培洛廷再以三聲部、四聲部擴展。"},
 {q:"「新藝術（Ars Nova）」時期由德國作曲家領導，主要貢獻是發明調性和聲。",ans:false,e:"❌ 錯！新藝術以法國（菲利浦·德·維特里）為中心；主要貢獻是節奏記譜法的革新與世俗音樂興起。"},
 {q:"馬肖（Guillaume de Machaut）的《聖母彌撒曲》是史上第一部由「單一作曲家」完成的彌撒套曲。",ans:true,e:"✅ 正確！1364年馬肖《聖母彌撒曲》是第一部由單一作曲家完成的「常用彌撒五部分」整體創作。"},
 {q:"中世紀的「遊吟詩人」（Troubadours）以拉丁文寫成宗教歌曲，主要服務教會。",ans:false,e:"❌ 錯！遊吟詩人以「方言（普羅旺斯語等）」創作「世俗歌曲」，多歌頌愛情、英雄、騎士。"},
 {q:"中世紀教會音樂的七種教會調式中，最常用的是「多利安（Dorian）」調式。",ans:true,e:"✅ 正確！多利安、弗里吉安、利底亞、米索利底亞是四種正格調式，多利安最為常用。"},
 {q:"經文歌（Motet）起源於中古晚期，原本是「奧爾加農」上方加入歌詞而發展出來。",ans:true,e:"✅ 正確！經文歌起源於 13 世紀，由奧爾加農上層加入歌詞（mot＝字）發展而成，後成為文藝復興主要曲種。"},

 {q:"文藝復興的「無伴奏合唱」風格義大利文稱為「A cappella」，意為「依教堂風格」。",ans:true,e:"✅ 正確！A cappella 字面意為「在小教堂中」，引申為「無樂器伴奏的合唱」風格。"},
 {q:"牧歌（Madrigal）起源於義大利，採用方言（義大利文）歌詞，內容多為愛情詩、自然景色。",ans:true,e:"✅ 正確！16世紀的義大利牧歌結合精緻歌詞與「文字描繪（word painting）」手法，世俗音樂代表。"},
 {q:"印刷術的發明對文藝復興音樂沒有什麼影響，因為大家還是仰賴手抄譜傳遞。",ans:false,e:"❌ 錯！1501年佩特魯齊出版第一本複音活版印刷樂譜後，樂譜大量流通，徹底改變音樂傳遞。"},

 {q:"文藝復興後期義大利「牧歌」的「文字描繪」（word painting）是指將歌詞意義以音樂手法具象化。",ans:true,e:"✅ 正確！例：歌詞「上升」用上行旋律、「哭泣」用半音下行，是牧歌的特徵性技法。"},
 {q:"威尼斯樂派（Venetian School）以聖馬可大教堂為中心，發展「複合唱（Cori spezzati）」風格。",ans:true,e:"✅ 正確！威拉爾特、加布利埃利叔姪將分組合唱於聖馬可大教堂南北唱台對唱，啟發巴洛克協奏風格。"},
 {q:"史上第一部「歌劇雛形」是 1597 年義大利佩里（Peri）的《達芙妮》（Dafne）。",ans:true,e:"✅ 正確！佛羅倫斯卡梅拉塔同人會（Camerata）追隨古希臘戲劇精神，催生史上第一部歌劇雛形。"},

TF:[
 {q:"巴洛克時期最重要的伴奏型態是「數字低音（Basso Continuo）」，由低音樂器與和聲樂器共同擔任。",ans:true,e:"✅ 正確！數字低音是巴洛克的招牌：低音聲部加上和聲樂器（大鍵琴/魯特琴）即興填充和聲。"},
 {q:"歌劇起源於 17 世紀的義大利佛羅倫斯，蒙特威爾第的《奧菲歐》（1607）是第一部完整保存的歌劇。",ans:true,e:"✅ 正確！蒙特威爾第《奧菲歐》是第一部完整保存的歌劇，標誌巴洛克歌劇成熟。"},
 {q:"巴哈一生並未離開德國，主要活躍於萊比錫、威瑪、科登等地。",ans:true,e:"✅ 正確！巴哈一生侍奉德國各地教會與宮廷，足跡未曾離開德意志地區。"},
 {q:"韓德爾的神劇《彌賽亞》是用德文寫成，描述耶穌生平。",ans:false,e:"❌ 錯！《彌賽亞》（1741）以「英文」寫成，由詹斯（Jennens）編詞。著名的〈哈利路亞〉合唱出自此曲。"},
 {q:"巴哈的《布蘭登堡協奏曲》共有六首，獻給布蘭登堡侯爵，每首樂器編制都不同。",ans:true,e:"✅ 正確！《布蘭登堡協奏曲》（1721）六首皆採不同編制，展現大協奏曲（Concerto Grosso）的多樣面貌。"},
 {q:"韋瓦第的《四季》是世界上最早的協奏曲，每首搭配一首十四行詩，是標題音樂的早期範例。",ans:true,e:"✅ 正確！韋瓦第《四季》（1725）每首小提琴協奏曲對應一首十四行詩，被視為標題音樂的先驅。"},
 {q:"巴洛克時期的「賦格（Fugue）」是一種「複音」對位形式，由主題、答題、對題輪流出現。",ans:true,e:"✅ 正確！賦格以「主題」開頭，依序模仿（答題）並加上「對題」，代表巴洛克對位法的最高成就。"},
 {q:"巴哈完成的《平均律鍵盤曲集》共有兩冊，每冊各包含 12 個大調與 12 個小調，共 24 首前奏與賦格。",ans:true,e:"✅ 正確！兩冊各24首（12大調＋12小調），合計48首前奏曲與賦格，是西洋鍵盤聖經。"},
 {q:"巴洛克器樂組曲（Suite）的標準四個樂章是：阿勒曼、庫朗、薩拉邦、吉格。",ans:true,e:"✅ 正確！四標準舞曲：阿勒曼（德，中速）、庫朗（法，快）、薩拉邦（西，慢三）、吉格（英，急）。"},
 {q:"巴洛克歌劇的「返始詠嘆調（Da Capo Aria）」採用 A-B-A' 三段體，A' 是 A 的縮減版。",ans:false,e:"❌ 錯！返始詠嘆調是 A-B-A 結構，A' 是「裝飾性的重複」（演唱者即興加花），非縮減版。"},

 {q:"以下哪一首是巴哈最後的、未完成的作品？",opts:["《b 小調彌撒》","《賦格的藝術》","《音樂的奉獻》","《郭德堡變奏曲》"],ans:1,e:"《賦格的藝術》（1751）是巴哈最後作品，未完成即逝世，展示對位法的所有可能性。"},

 {q:"古典時期取代巴洛克「數字低音」的標準伴奏形式是「阿爾貝堤低音」——分解和弦伴奏。",ans:true,e:"✅ 正確！阿爾貝堤低音（Alberti bass）以分解和弦取代數字低音，是古典時期典型伴奏型態。"},
 {q:"莫札特的《安魂曲》於 1791 年完成，是莫札特生前最後完成的作品。",ans:false,e:"❌ 錯！《安魂曲》「未完成」即逝世，由弟子蘇斯邁爾（Süssmayr）依草稿補完。"},

 {q:"聖桑《動物狂歡節》生前唯一願意公開演出的樂章是？",opts:["序曲及獅子進行曲","水族館","天鵝","化石"],ans:2,e:"第13樂章「天鵝」（Le Cygne）是聖桑生前唯一願意公開的樂章，大提琴旋律最為優美。"},

 {q:"「俄國五人組」由穆梭斯基、林姆斯基-高沙可夫、鮑羅定、庫宜、巴拉基列夫所組成，又稱「強力集團」。",ans:true,e:"✅ 正確！這五位非職業音樂家組成強力集團（The Mighty Handful），以民族題材對抗西歐主流。"},

 {q:"史麥塔納（Smetana）的交響詩集《我的祖國》共六首，其中第二首〈莫爾道河〉最著名。",ans:true,e:"✅ 正確！《我的祖國》（Má vlast）共6首交響詩，第二首〈莫爾道河〉（Vltava）家喻戶曉。"},
 {q:"德弗札克的《新世界》交響曲是他在巴黎時期寫成的，使用了大量法國民謠。",ans:false,e:"❌ 錯！《新世界》第九交響曲（1893）是德弗札克在「美國」紐約所作，融合美國黑人靈歌與印第安音樂元素。"},
 {q:"葛利格（Grieg）是挪威國民樂派代表，其組曲《培爾金特》源自易卜生（Ibsen）的同名戲劇配樂。",ans:true,e:"✅ 正確！葛利格為挪威戲劇大師易卜生《培爾金特》（Peer Gynt）寫的配樂，後整理為兩套組曲。"},
 {q:"西貝流士的《芬蘭頌》（Finlandia）成為芬蘭民族獨立運動的精神象徵。",ans:true,e:"✅ 正確！1899年《芬蘭頌》激起芬蘭人對抗俄國統治的民族情感，被視為非官方國歌。"},
 {q:"巴爾托克（Bartók）與高大宜（Kodály）深入鄉村採集匈牙利民謠，奠定 20 世紀民族音樂學基礎。",ans:true,e:"✅ 正確！1905 年起兩人深入匈牙利、羅馬尼亞、斯洛伐克鄉村採集民謠，是現代民族音樂學先驅。"},
 {q:"西班牙國民樂派代表是阿爾班尼士、葛拉納多斯與法雅，他們致力於展現西班牙的吉普賽、佛朗明哥特色。",ans:true,e:"✅ 正確！阿爾班尼士《依貝利亞》、葛拉納多斯《哥雅之畫》、法雅《愛情魔法師》代表西班牙國民樂派。"},
],

 {q:"林姆斯基-高沙可夫的著名管弦樂組曲是？",opts:["《天方夜譚》","《行星組曲》","《圖畫展覽會》","《我的祖國》"],ans:0,e:"《天方夜譚》（Scheherazade, 1888）是林姆斯基-高沙可夫最著名的管弦樂作品，色彩斑斕。"},

 {q:"葛利格的鋼琴協奏曲 a 小調受到哪一位作曲家的鋼琴協奏曲影響？",opts:["蕭邦","李斯特","舒曼","柴可夫斯基"],ans:2,e:"葛利格 a 小調鋼琴協奏曲（1868）深受舒曼 a 小調鋼琴協奏曲影響，調性與架構皆相近。"},

 {q:"以下哪一位「不是」西班牙國民樂派代表？",opts:["阿爾班尼士","葛拉納多斯","法雅","薩拉沙泰"],ans:3,e:"薩拉沙泰（Sarasate）是西班牙小提琴大師，創作偏炫技風格，不算典型的西班牙國民樂派作曲家。"},
 {q:"史麥塔納晚年失聰，但仍創作不輟，他與哪一位古典時期作曲家有相同的命運？",opts:["莫札特","海頓","貝多芬","蕭邦"],ans:2,e:"史麥塔納（1824-1884）50歲耳聾，與貝多芬命運相似，仍在失聰中完成《我的祖國》交響詩集。"},
 {q:"以下哪一位是「英國音樂復興」國民樂派代表？",opts:["佛漢-威廉斯（Vaughan Williams）","艾爾加（Elgar）","荷爾斯特（Holst）","以上皆是"],ans:3,e:"19世紀末-20世紀初英國音樂復興：艾爾加、佛漢-威廉斯、荷爾斯特、布瑞頓，皆以英國素材創作。"},
 {q:"鮑羅定的歌劇《伊果王子》中最著名的是？",opts:["序曲","波羅維茲舞曲","愛情二重唱","終曲合唱"],ans:1,e:"〈波羅維茲舞曲〉（Polovtsian Dances）為《伊果王子》中最著名的段落。"},

 {q:"印象樂派的代表是德布西與拉威爾，他們的音樂以模糊的調性、色彩、氛圍為特色。",ans:true,e:"✅ 正確！印象樂派以全音音階、五聲音階、平行和弦、平行五度創造模糊朦朧的色彩。"},
 {q:"德布西的《牧神的午後前奏曲》（1894）被視為印象樂派的開山之作。",ans:true,e:"✅ 正確！《牧神的午後前奏曲》依馬拉美象徵主義詩作而成，是印象樂派的劃時代作品。"},
 {q:"史特拉汶斯基的《春之祭》（1913）在巴黎首演時引發騷動，是 20 世紀音樂史最著名的事件之一。",ans:true,e:"✅ 正確！《春之祭》以原始節奏、不協和聲響、異教題材震驚觀眾，引發爆動，成為現代音樂里程碑。"},
 {q:"荀貝格的「十二音技法」是一種「規定 12 個音必須等次出現」的作曲方法。",ans:true,e:"✅ 正確！十二音技法（dodecaphony）將 12 個半音排成「音列」（Tone Row），確保每個音平等使用。"},
 {q:"第二維也納樂派由荀貝格與其弟子貝爾格、魏本組成，發展無調性與十二音音樂。",ans:true,e:"✅ 正確！第二維也納樂派（Second Viennese School）：荀貝格、貝爾格、魏本。"},

 {q:"史特拉汶斯基的創作生涯只有「俄羅斯時期」與「序列音樂時期」兩個階段。",ans:false,e:"❌ 錯！史特拉汶斯基創作分三期：俄羅斯時期（春之祭）、新古典時期（普希內拉）、序列音樂時期（晚年）。"},
 {q:"葛拉斯（Glass）、萊許（Reich）為簡約主義（Minimalism）代表，以重複、漸進變化的音型構成音樂。",ans:true,e:"✅ 正確！簡約主義 1960s 興起於美國，特徵是反複、相位偏移、漸進變化。"},
 {q:"電子音樂在 20 世紀後半發展迅速，現代電子合成器催生了 20 世紀末的電音文化。",ans:true,e:"✅ 正確！從具象音樂到電子合成器（Moog 1964）再到 MIDI（1983），電子音樂改變音樂創作。"},

function sfl(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pk(a,n){return sfl(a).slice(0,Math.min(n,a.length));}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let curEra=null,mode=null,gs={};
const app=document.getElementById('app');

function pb(tot,cur){return '<div class="prog-bar">'+Array.from({length:tot},(_,i)=>`<div class="prog-seg ${i<cur?'pd':i===cur?'pc':''}"></div>`).join('')+'</div>';}

function showEras(){
 curEra=null;mode=null;
 const cards=ERAS.map(e=>`<div class="era-btn" style="--ec:${e.color}" onclick="enterEra('${e.id}')"><div class="eicon">${e.icon}</div><div class="elabel">${e.name}</div><span class="eyrs">${e.sub}</span></div>`).join('');
 app.innerHTML=`<div class="era-grid">${cards}</div><div class="tip">🎼 點選任一樂派 → 選擇學習模式（速查手冊 / 時間軸 / 是非題 / 選擇題 / 作品配對 / 稱號配對）→ 隨時可返回挑戰其他樂派！</div>`;
}

function enterEra(id){
 curEra=id;mode=null;
 const era=ERAS.find(e=>e.id===id);
 const banner=`<div class="era-banner" style="--ec:${era.color}"><h2>${era.icon} ${era.name}</h2><span class="esub">${era.sub}</span><div class="eintro">${era.intro}</div></div>`;
 const topBar=`<div class="top-bar"><button class="back-btn" onclick="showEras()">← 樂派總覽</button></div>`;
 const modes=`<div class="mode-grid">
 <div class="mode-btn" onclick="sm('intro')"><div class="micon">🎯</div><div class="mlabel">樂派導覽</div><div class="mdesc">特色與必聽</div></div>
 <div class="mode-btn" onclick="sm('rf')"><div class="micon">📖</div><div class="mlabel">速查手冊</div><div class="mdesc">作曲家重點</div></div>
 <div class="mode-btn" onclick="sm('tl')"><div class="micon">🕒</div><div class="mlabel">時間軸</div><div class="mdesc">大事年表</div></div>
 <div class="mode-btn" onclick="sm('tf')"><div class="micon">⭕</div><div class="mlabel">是非題</div><div class="mdesc">真假判斷</div></div>
 <div class="mode-btn" onclick="sm('mc')"><div class="micon">📝</div><div class="mlabel">選擇題</div><div class="mdesc">四選一</div></div>
 <div class="mode-btn" onclick="sm('mW')"><div class="micon">🎵</div><div class="mlabel">作品配對</div><div class="mdesc">作品→人物</div></div>
 <div class="mode-btn" onclick="sm('mT')"><div class="micon">👑</div><div class="mlabel">稱號配對</div><div class="mdesc">稱號→人物</div></div>
 </div>`;
 const tip=`<div class="tip">💡 建議順序：速查手冊 → 時間軸 → 是非題 → 選擇題 → 配對遊戲，循序漸進掌握「${era.name}」的重點！</div>`;
 app.innerHTML=topBar+banner+modes+tip;
}

function sm(m){
 mode=m;
 if(m==='tf')iTF();
 else if(m==='mc')iMC();
 else if(m==='mW'||m==='mT')iMT();
 else if(m==='rf')showRef();
 else if(m==='tl')showTL();
 else if(m==='intro')showIntro();
}

function showIntro(){
 const era=ERAS.find(e=>e.id===curEra);
 const d=INTROS[curEra];
 if(!d){app.innerHTML='<div class="card">資料準備中</div>';return;}
 const c=era.color;
 const bg=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">📜 時代背景</div><div class="intro-body">${d.bg}</div></div>`;
 const ft=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">🎼 音樂特色</div><div class="feat-grid">${d.features.map(x=>`<div class="feat-card"><div class="ft">${x.f}</div><div class="fd">${x.d}</div></div>`).join('')}</div></div>`;
 const gn=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">🎵 重要曲種／形式</div><div class="feat-grid">${d.genres.map(x=>`<div class="feat-card"><div class="ft">${x.n}</div><div class="fd">${x.d}</div></div>`).join('')}</div></div>`;
 const tm=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">📚 重要術語</div><div class="term-grid">${d.terms.map(x=>`<div class="term-card"><div class="tt">${x.t}</div><div class="tz">${x.z}</div></div>`).join('')}</div></div>`;

}

function showResult(s,t){
 const p=Math.round(s/t*100);
 const ic=p>=90?"🏆":p>=70?"⭐":"🎵";
 const st=p>=90?"完美 KO!":p>=70?"還不錯!":"再加油!";
 app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回樂派</button><button class="restart-btn" onclick="sm('${mode}')">↺ 再玩一次</button></div><div class="card"><div class="result-box"><div class="ri">${ic}</div><div class="rs">${st}</div><div class="rsc">得分 ${s} / ${t}</div><div class="rp">正確率 ${p}%</div></div></div>`;
}

function getD(){return DATA[curEra];}

function iTF(){const d=getD();gs={qs:sfl(d.TF).slice(0,Math.min(10,d.TF.length)),i:0,s:0,a:null};rTF();}
function rTF(){
 const{qs,i,s,a}=gs;
 if(i>=qs.length){showResult(s,qs.length);return;}
 const q=qs[i];
 let t0='',t1='';
 if(a!==null){t0=q.ans===true?'tc':(a===true?'tw':'');t1=q.ans===false?'tc':(a===false?'tw':'');}
 const ex=a!==null?`<div class="explain ${a===q.ans?'eo':'en'}"><span class="${a===q.ans?'eho':'ehn'}">${a===q.ans?'✅ 答對啦！':'❌ 答錯了'}</span>${q.e}<button class="next-btn" onclick="nTF()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button></div>`:'';
 app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title">⭕ 是非題</span><button class="restart-btn" onclick="iTF()">↺ 重來</button></div>${pb(qs.length,i)}<div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div><div class="card"><div class="q-box">${q.q}</div><div class="tf-btns"><button class="tf-btn ${t0}" ${a!==null?'disabled':''} onclick="aTF(true)">○ 正確</button><button class="tf-btn ${t1}" ${a!==null?'disabled':''} onclick="aTF(false)">✗ 錯誤</button></div>${ex}</div>`;
}
function aTF(v){if(gs.a!==null)return;const ok=v===gs.qs[gs.i].ans;gs.a=v;if(ok)gs.s++;rTF();}
function nTF(){gs.i++;gs.a=null;rTF();}

function iMC(){const d=getD();gs={qs:sfl(d.MC).slice(0,Math.min(8,d.MC.length)),i:0,s:0,c:null};rMC();}
function rMC(){
 const{qs,i,s,c}=gs;
 if(i>=qs.length){showResult(s,qs.length);return;}
 const q=qs[i];
 const ob=q.opts.map((o,j)=>{let cl='';if(c!==null){cl=j===q.ans?'mc':(j===c?'mw':'');}return`<button class="mc-btn ${cl}" ${c!==null?'disabled':''} onclick="cMC(${j})"><span class="abadge">${['A','B','C','D'][j]}</span>${o}</button>`;}).join('');
 const ex=c!==null?`<div class="explain ${c===q.ans?'eo':'en'}"><span class="${c===q.ans?'eho':'ehn'}">${c===q.ans?'✅ 答對啦！':'❌ 答錯了'}</span>${q.e}<button class="next-btn" onclick="nMC()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button></div>`:'';
 app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title">📝 選擇題</span><button class="restart-btn" onclick="iMC()">↺ 重來</button></div>${pb(qs.length,i)}<div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div><div class="card"><div class="q-box">${q.q}</div>${ob}${ex}</div>`;
}
function cMC(j){if(gs.c!==null)return;gs.c=j;if(j===gs.qs[gs.i].ans)gs.s++;rMC();}
function nMC(){gs.i++;gs.c=null;rMC();}

function iMT(){
 const d=getD();
 const src=mode==='mW'?d.WORKS:d.TITLES;
 const n=Math.min(8,src.length);
 const pairs=pk(src,n);
 gs={pairs,L:sfl(pairs.map(p=>p.l)),R:sfl(pairs.map(p=>p.r)),lS:null,rS:null,M:{},W:{},s:0,at:0};
 rMT();
}
function rMT(){
 const{pairs,L,R,lS,rS,M,W,s,at}=gs;
 const lbl=mode==='mW'?'🎵 作品配對':'👑 稱號配對';
 const lhdr=mode==='mW'?'作　品':'稱　號';
 function mi(v,sd,idx){
 const isSel=sd==='L'?lS===v:rS===v;
 const isM=M[v],isW=W[v];
 let cl='mi';
 if(isM)cl+=' mi-m';else if(isW)cl+=' mi-w';else if(isSel)cl+=' mi-s';
 const oc=isM?'':` onclick="selM('${sd}',${idx})"`;
 return`<div class="${cl}"${oc}>${esc(v)}</div>`;
 }
 let cells='';
 const n=Math.max(L.length,R.length);
 for(let i=0;i<n;i++){if(L[i])cells+=mi(L[i],'L',i);if(R[i])cells+=mi(R[i],'R',i);}
 const dm=s===pairs.length?`<div class="done-msg">🎉 全部配對完成！共嘗試 ${at} 次</div>`:'';
 app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title">${lbl}</span><button class="restart-btn" onclick="iMT()">↺ 重來</button></div><div class="stat-row"><div class="chip">已配對 <strong>${s}</strong>/${pairs.length}</div><div class="chip">嘗試 <strong>${at}</strong> 次</div></div><div class="card"><div class="match-hdr"><div>${lhdr}</div><div>人 物 ／ 出 處</div></div><div class="match-grid">${cells}</div>${dm}</div>`;
}
function selM(sd,idx){
 const g=gs;
 const v=sd==='L'?g.L[idx]:g.R[idx];
 if(!v||g.M[v])return;
 if(sd==='L')g.lS=g.lS===v?null:v;
 else g.rS=g.rS===v?null:v;
 if(g.lS&&g.rS){
 const p=g.pairs.find(x=>x.l===g.lS);
 const ok=p&&p.r===g.rS;
 g.at++;
 if(ok){g.M[g.lS]=true;g.M[g.rS]=true;g.s++;g.lS=null;g.rS=null;g.W={};}
 else{g.W={[g.lS]:true,[g.rS]:true};setTimeout(()=>{g.W={};g.lS=null;g.rS=null;rMT();},700);}
 }
 rMT();
}

function showRef(){
 const era=ERAS.find(e=>e.id===curEra);
 const d=getD();
 const items=d.REF.map((c,i)=>{
 return`<div class="ref-item"><div class="ref-head" onclick="tgRef(${i})"><div class="ref-av" style="background:${era.color}">${c.name[0]}</div><div style="flex:1"><div class="ref-name">${c.name}</div><div class="ref-sub">${c.dates}</div></div><div class="ref-badge" style="background:${era.color}">${c.period}</div><div class="ref-arr" id="a${i}">▼</div></div><div id="b${i}" style="display:none"><ul class="ref-body">${c.facts.map(f=>`<li>${f}</li>`).join('')}</ul></div></div>`;
 }).join('');
 app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title">📖 速查手冊</span></div><div class="card"><div style="font-size:.78rem;color:#666;margin-bottom:10px;font-weight:600">點擊作曲家展開重點整理</div>${items}</div>`;
}
function tgRef(i){
 const b=document.getElementById('b'+i);
 const a=document.getElementById('a'+i);
 if(!b)return;
 const o=b.style.display!=='none';
 b.style.display=o?'none':'block';
 if(a)a.textContent=o?'▼':'▲';
}

function showTL(){
 const era=ERAS.find(e=>e.id===curEra);
 const items=era.TIMELINE.map(t=>`<div class="tl-item"><span class="tl-yr">${t.y}</span><div class="tl-tx">${t.t}</div></div>`).join('');
 app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title">🕒 時間軸</span></div><div class="card" style="--ec:${era.color}"><div style="font-size:.8rem;color:#666;margin-bottom:10px;text-align:center;font-weight:700">${era.sub}</div><div class="tl">${items}</div></div>`;
}

showEras();
</script>
</body>
</html>
