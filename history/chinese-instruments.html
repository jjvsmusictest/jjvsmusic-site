<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>中國樂器概述 · 互動學習</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --ink:#1C1008;
  --rice:#FAF6EE;
  --parch:#F0E8D4;
  --red:#B5272B;
  --darkred:#8A1A1E;
  --gold:#C9920A;
  --dkgold:#9A6F08;
  --jade:#2A6B5A;
  --indigo:#2D3A6B;
  --shadow:rgba(0,0,0,0.18);
  --brush:rgba(28,16,8,0.08);
}

body{
  background:var(--rice);
  background-image:
    radial-gradient(ellipse at 0% 0%, rgba(181,39,43,0.06) 0%, transparent 55%),
    radial-gradient(ellipse at 100% 100%, rgba(201,146,10,0.05) 0%, transparent 55%),
    repeating-linear-gradient(90deg, transparent 0, transparent 59px, var(--brush) 59px, var(--brush) 60px),
    repeating-linear-gradient(0deg, transparent 0, transparent 59px, var(--brush) 59px, var(--brush) 60px);
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink);
  padding:16px;
  min-height:100vh;
  font-weight:500;
  max-width:800px;
  margin:0 auto;
}

/* ── HEADER ── */
.hd{text-align:center;padding:22px 0 14px;margin-bottom:18px;position:relative}
.hd::after{content:'';display:block;height:3px;
  background:linear-gradient(90deg,transparent,var(--red),var(--gold),var(--red),transparent);
  margin-top:14px;border-radius:2px}
.hd-stamp{display:inline-block;background:var(--red);color:#fff;
  font-family:'Noto Serif TC',serif;font-size:.68rem;font-weight:900;
  padding:4px 14px;border-radius:0;border:2px solid var(--darkred);
  box-shadow:3px 3px 0 var(--darkred);margin-bottom:10px;letter-spacing:.15em;
  transform:rotate(-1deg)}
h1{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:900;color:var(--ink);
  line-height:1.25;letter-spacing:.05em}
h1 span{color:var(--red)}
.hd-sub{font-size:.75rem;color:#888;font-weight:600;letter-spacing:.1em;margin-top:6px}

/* ── CATEGORY NAV ── */
.cat-nav{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:20px}
.cat-btn{padding:16px 10px;border-radius:4px;cursor:pointer;text-align:center;
  background:var(--ec,#888);border:2.5px solid var(--ink);
  box-shadow:4px 4px 0 var(--ink);transition:all .12s;color:#fff;
  position:relative;overflow:hidden}
.cat-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 60%)}
.cat-btn:nth-child(odd){transform:rotate(-.6deg)}
.cat-btn:nth-child(even){transform:rotate(.6deg)}
.cat-btn:hover{transform:translate(-2px,-3px) rotate(0)!important;box-shadow:6px 7px 0 var(--ink)}
.cat-btn:active{transform:translate(3px,3px) rotate(0)!important;box-shadow:1px 1px 0 var(--ink)}
.c-icon{font-size:2rem;margin-bottom:6px;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.35))}
.c-name{font-family:'Noto Serif TC',serif;font-weight:900;font-size:1rem;
  text-shadow:2px 2px 0 rgba(0,0,0,.3);margin-bottom:3px}
.c-sub{font-size:.64rem;background:rgba(0,0,0,.55);padding:2px 8px;
  border-radius:2px;font-weight:700;display:inline-block}

/* ── OVERVIEW CARD ── */
.ov-card{background:#fff;border:2.5px solid var(--ink);border-radius:4px;padding:16px;
  box-shadow:5px 5px 0 var(--ink);margin-bottom:18px;position:relative}
.ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--gold))}
.ov-title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:.95rem;
  color:var(--red);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ov-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--red),transparent)}
.ov-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov-box{background:var(--parch);border:1.5px solid rgba(0,0,0,.2);border-radius:3px;padding:10px 12px}
.ov-h{font-weight:900;font-size:.78rem;color:var(--red);margin-bottom:6px;
  font-family:'Noto Serif TC',serif}
.ov-list{list-style:none;padding:0}
.ov-list li{font-size:.74rem;line-height:1.75;color:#333;padding-left:12px;position:relative}
.ov-list li::before{content:'✦';position:absolute;left:0;color:var(--gold);font-size:.55rem;top:3px}

/* ── QUICK TABLE ── */
.qtable-wrap{overflow-x:auto;margin-top:10px}
.qtable{width:100%;border-collapse:collapse;font-size:.72rem}
.qtable th{background:var(--red);color:#fff;padding:7px 10px;
  border:1.5px solid var(--darkred);font-weight:900;text-align:center;
  font-family:'Noto Serif TC',serif;letter-spacing:.05em;white-space:nowrap}
.qtable td{padding:6px 10px;border:1px solid rgba(0,0,0,.2);vertical-align:top;line-height:1.6}
.qtable tr:nth-child(even) td{background:var(--parch)}
.qtable tr:hover td{background:rgba(181,39,43,.06)}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.back-btn{padding:7px 15px;border-radius:3px;cursor:pointer;font-size:.76rem;
  background:#fff;border:2px solid var(--ink);color:var(--ink);
  font-family:inherit;font-weight:800;box-shadow:3px 3px 0 var(--ink);transition:all .1s}
.back-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.back-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.mode-badge{font-weight:900;font-size:.88rem;color:#fff;background:var(--red);
  padding:5px 14px;border:2px solid var(--darkred);border-radius:3px;
  box-shadow:3px 3px 0 var(--darkred);font-family:'Noto Serif TC',serif;
  text-shadow:1px 1px 0 rgba(0,0,0,.4);letter-spacing:.04em}

/* ── CATEGORY BANNER ── */
.cat-banner{padding:16px;border-radius:4px;margin-bottom:14px;background:var(--ec);
  border:2.5px solid var(--ink);color:#fff;box-shadow:6px 6px 0 var(--ink);
  position:relative;overflow:hidden}
.cat-banner::after{content:'';position:absolute;top:-30px;right:-30px;
  width:120px;height:120px;border:3px solid rgba(255,255,255,.15);border-radius:50%}
.cat-banner h2{font-family:'Noto Serif TC',serif;font-size:1.35rem;
  font-weight:900;margin-bottom:4px;text-shadow:2px 2px 0 rgba(0,0,0,.3)}
.cat-banner .c-tag{display:inline-block;background:rgba(0,0,0,.6);
  padding:2px 10px;border-radius:2px;font-size:.7rem;font-weight:700;margin-bottom:8px}
.cat-banner .c-intro{font-size:.8rem;line-height:1.7;font-weight:600;
  background:rgba(0,0,0,.2);border-radius:4px;padding:8px 12px;margin-top:6px}

/* ── MODE GRID ── */
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:10px;margin-bottom:14px}
.mode-btn{padding:13px 8px;border-radius:3px;cursor:pointer;text-align:center;
  background:#fff;border:2.5px solid var(--ink);box-shadow:4px 4px 0 var(--ink);
  transition:all .12s;font-family:inherit}
.mode-btn:hover{transform:translate(-1px,-2px);box-shadow:5px 6px 0 var(--ink)}
.mode-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.m-icon{font-size:1.6rem;margin-bottom:5px}
.m-label{font-weight:900;font-size:.85rem;color:var(--ink);margin-bottom:3px;font-family:'Noto Serif TC',serif}
.m-desc{color:#888;font-size:.65rem;font-weight:600}

/* ── INSTRUMENT SECTIONS ── */
.inst-sec{background:#fff;border:2.5px solid var(--ink);border-radius:4px;
  margin-bottom:12px;overflow:hidden;box-shadow:4px 4px 0 var(--ink)}
.inst-hd{padding:10px 16px;font-weight:900;font-size:.88rem;color:#fff;
  background:var(--ec,var(--red));font-family:'Noto Serif TC',serif;
  text-shadow:1px 1px 0 rgba(0,0,0,.3);display:flex;align-items:center;gap:8px}
.inst-body{padding:14px 16px}

.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;padding:12px}
.inst-card{background:var(--parch);border:1.5px solid rgba(0,0,0,.2);
  border-radius:3px;padding:10px 12px;cursor:pointer;transition:all .15s}
.inst-card:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);border-color:var(--red)}
.ic-name{font-family:'Noto Serif TC',serif;font-weight:900;font-size:.92rem;
  color:var(--red);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ic-tag{font-size:.6rem;background:var(--red);color:#fff;padding:1px 6px;border-radius:2px;font-weight:700}
.ic-desc{font-size:.73rem;color:#555;line-height:1.65}

/* ── INSTRUMENT DETAIL ── */
.detail-box{background:var(--parch);border:1.5px solid rgba(0,0,0,.2);
  border-radius:3px;padding:12px 14px;margin:10px 0;font-size:.8rem;line-height:1.8;color:#333}
.detail-section{margin-bottom:10px}
.detail-h{font-weight:900;color:var(--red);font-size:.82rem;
  font-family:'Noto Serif TC',serif;margin-bottom:5px;
  display:flex;align-items:center;gap:6px}
.detail-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--red),transparent)}
.works-table{width:100%;border-collapse:collapse;font-size:.74rem;margin-top:6px}
.works-table th{background:var(--gold);color:#fff;padding:5px 9px;
  border:1px solid var(--dkgold);font-weight:900;text-align:left}
.works-table td{padding:5px 9px;border:1px solid rgba(0,0,0,.15);vertical-align:top;line-height:1.5}
.works-table tr:nth-child(even) td{background:rgba(0,0,0,.04)}

/* ── LISTEN ── */
.listen-item{padding:10px 16px;border-bottom:1px solid rgba(0,0,0,.12);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.listen-item:last-child{border-bottom:none}
.li-info{flex:1;min-width:150px}
.li-title{font-weight:900;font-size:.85rem;margin-bottom:2px;
  font-family:'Noto Serif TC',serif;color:var(--ink)}
.li-detail{font-size:.7rem;color:#777;line-height:1.5}
.yt-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;
  border-radius:3px;background:#c4302b;color:#fff;font-size:.7rem;font-weight:900;
  text-decoration:none;border:2px solid #8a1a1e;box-shadow:3px 3px 0 #8a1a1e;
  transition:all .1s;white-space:nowrap;flex-shrink:0;font-family:inherit}
.yt-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #8a1a1e}

/* ── REF ACCORDION ── */
.ref-item{border-bottom:1px solid rgba(0,0,0,.12)}
.ref-item:last-child{border-bottom:none}
.ref-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  transition:background .15s;border-radius:3px}
.ref-head:hover{background:var(--parch)}
.ref-av{width:36px;height:36px;border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:1rem;font-weight:900;color:#fff;
  border:2px solid var(--ink);flex-shrink:0;font-family:'Noto Serif TC',serif}
.ref-name{font-weight:900;font-size:.88rem;font-family:'Noto Serif TC',serif}
.ref-sub{font-size:.68rem;color:#888;margin-top:1px}
.ref-badge{padding:3px 10px;border-radius:2px;font-size:.64rem;font-weight:900;color:#fff;
  margin-left:auto;border:1.5px solid rgba(0,0,0,.3);white-space:nowrap;flex-shrink:0}
.ref-arr{font-size:.8rem;color:#aaa;flex-shrink:0}
.ref-body{padding:0 14px 12px 56px}
.ref-body li{font-size:.77rem;line-height:1.8;color:#333;list-style:none;
  padding-left:14px;position:relative}
.ref-body li::before{content:'♩';position:absolute;left:0;color:var(--gold);font-size:.7rem}

/* ── QUIZ ── */
.q-box{background:var(--parch);border:2.5px solid var(--ink);border-radius:4px;
  padding:14px 17px;font-size:.88rem;color:var(--ink);line-height:1.75;
  margin-bottom:14px;font-weight:600;box-shadow:3px 3px 0 var(--ink);
  position:relative}
.q-box::before{content:'問';position:absolute;top:-14px;left:14px;
  background:var(--red);color:#fff;width:28px;height:28px;border:2px solid var(--darkred);
  border-radius:3px;font-weight:900;font-size:.9rem;font-family:'Noto Serif TC',serif;
  display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 var(--darkred)}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tf-btn{padding:13px;border-radius:3px;border:2.5px solid var(--ink);background:#fff;
  color:var(--ink);font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:900;
  transition:all .1s;box-shadow:4px 4px 0 var(--ink)}
.tf-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink)}
.tf-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.tc{background:#2ED573!important;color:#fff!important;border-color:#1aA350!important}
.tw{background:#E84040!important;color:#fff!important;border-color:#B52020!important}
.mc-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 13px;
  border-radius:3px;margin-bottom:8px;border:2.5px solid var(--ink);background:#fff;
  color:var(--ink);font-size:.83rem;cursor:pointer;font-family:inherit;text-align:left;
  transition:all .1s;font-weight:700;box-shadow:3px 3px 0 var(--ink)}
.mc-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.mc{background:#2ED573!important;color:#fff!important;border-color:#1aA350!important}
.mw{background:#E84040!important;color:#fff!important;border-color:#B52020!important}
.abadge{width:25px;height:25px;border-radius:3px;background:var(--gold);border:1.5px solid var(--dkgold);
  display:inline-flex;align-items:center;justify-content:center;font-size:.76rem;
  font-weight:900;flex-shrink:0;color:#fff;font-family:'Noto Serif TC',serif}
.mc .abadge,.mw .abadge{background:rgba(255,255,255,.3);border-color:rgba(255,255,255,.4)}
.explain{margin-top:12px;padding:13px 15px;border-radius:4px;font-size:.79rem;
  line-height:1.65;font-weight:600;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink)}
.eo{background:#D6FFE6}.en{background:#FFE0E3}
.eho,.ehn{font-weight:900;display:block;margin-bottom:5px;font-size:.88rem}
.eho{color:#0F8C40}.ehn{color:#C8243A}
.next-btn{margin-top:10px;padding:7px 20px;border-radius:3px;cursor:pointer;
  background:var(--gold);border:2px solid var(--dkgold);color:#fff;font-size:.82rem;
  font-family:inherit;font-weight:900;box-shadow:3px 3px 0 var(--dkgold);transition:all .1s;
  text-shadow:1px 1px 0 rgba(0,0,0,.3);font-family:'Noto Serif TC',serif}
.next-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--dkgold)}
.next-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--dkgold)}
.prog-bar{display:flex;gap:3px;margin-bottom:12px;background:#fff;padding:5px;
  border:2px solid var(--ink);border-radius:3px;box-shadow:3px 3px 0 var(--ink)}
.prog-seg{flex:1;height:8px;border-radius:2px;background:#ddd;border:1px solid rgba(0,0,0,.15);transition:background .3s}
.pd{background:#2ED573!important}.pc{background:var(--gold)!important}
.stat-row{display:flex;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.chip{background:#fff;border:2px solid var(--ink);border-radius:3px;padding:4px 12px;
  font-size:.76rem;color:var(--ink);font-weight:800;box-shadow:2px 2px 0 var(--ink)}
.chip strong{color:var(--red)}

/* ── MATCH GAME ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.match-hdr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;
  text-align:center;font-size:.76rem;font-weight:900;color:#fff}
.match-hdr div{background:var(--jade);border:1.5px solid var(--ink);border-radius:3px;
  padding:5px;box-shadow:2px 2px 0 var(--ink);font-family:'Noto Serif TC',serif}
.mi{padding:9px;border-radius:3px;border:2px solid var(--ink);background:#fff;
  cursor:pointer;font-size:.76rem;font-weight:700;text-align:center;transition:all .15s;
  box-shadow:3px 3px 0 var(--ink);line-height:1.4;min-height:42px;
  display:flex;align-items:center;justify-content:center}
.mi:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.mi-s{background:var(--gold)!important;color:#fff!important;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.mi-m{background:#2ED573!important;color:#fff!important;cursor:default;box-shadow:none;transform:none}
.mi-w{background:#E84040!important;color:#fff!important}
.done-msg{text-align:center;padding:14px;font-weight:900;font-size:.95rem;color:var(--jade);
  background:#D6FFE6;border:2px solid var(--ink);border-radius:3px;margin-top:10px;
  font-family:'Noto Serif TC',serif}

/* ── RESULT ── */
.card{background:#fff;border:2.5px solid var(--ink);border-radius:4px;padding:14px;
  box-shadow:4px 4px 0 var(--ink)}
.result-box{text-align:center;padding:20px}
.ri{font-size:3.5rem;margin-bottom:8px}
.rs{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:900;margin-bottom:4px}
.rsc{font-size:1rem;font-weight:700;color:var(--red);margin-bottom:4px}
.rp{font-size:.82rem;color:#888;font-weight:600}

/* ── TIP ── */
.tip{background:#fff;border:2.5px solid var(--ink);border-radius:4px;padding:14px 18px;
  font-size:.79rem;color:var(--ink);line-height:1.75;font-weight:600;
  box-shadow:4px 4px 0 var(--ink);margin-top:10px;position:relative}
.tip::before{content:"📜 學習提示";position:absolute;top:-13px;left:18px;
  background:var(--gold);color:#fff;padding:2px 12px;border:2px solid var(--dkgold);
  border-radius:2px;font-size:.7rem;font-weight:900;text-shadow:1px 1px 0 rgba(0,0,0,.3);
  font-family:'Noto Serif TC',serif}

.scroll-top{position:fixed;bottom:20px;right:20px;background:var(--red);color:#fff;
  border:2px solid var(--darkred);border-radius:3px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:1.1rem;box-shadow:3px 3px 0 var(--darkred);transition:all .1s;z-index:100;
  font-family:'Noto Serif TC',serif;font-weight:900}
.scroll-top:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--darkred)}

@media(max-width:500px){
  h1{font-size:1.55rem}
  .cat-nav{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .ov-2col{grid-template-columns:1fr}
}
</style>

<script>
// ================================================================
//  DATA
// ================================================================
const CATS = [
  {

// ================================================================
//  TF
// ================================================================
function initTF(){
  const c=CATS.find(x=>x.id===curCat);
  gs={qs:sfl(c.TF).slice(0,Math.min(8,c.TF.length)),i:0,s:0,a:null};
  renderTF();
}
function renderTF(){
  const{qs,i,s,a}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  let t0='',t1='';
  if(a!==null){t0=q.ans===true?'tc':(a===true?'tw':'');t1=q.ans===false?'tc':(a===false?'tw':'');}
  const ex=a!==null?`<div class="explain ${a===q.ans?'eo':'en'}">
    <span class="${a===q.ans?'eho':'ehn'}">${a===q.ans?'✅ 答對！':'❌ 答錯了'}</span>${q.e}
    <br><button class="next-btn" onclick="nextTF()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button>
  </div>`:'';
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterCat('${curCat}')">← 返回</button>
    <span class="mode-badge">⭕ 是非練習</span>
    <button class="back-btn" onclick="initTF()" style="margin-left:auto;background:var(--parch)">↺ 重來</button>
  </div>
  ${pb(qs.length,i)}
  <div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div>
  <div class="card">
    <div class="q-box">${q.q}</div>
    <div class="tf-btns">
      <button class="tf-btn ${t0}" ${a!==null?'disabled':''} onclick="ansTF(true)">○ 正確</button>
      <button class="tf-btn ${t1}" ${a!==null?'disabled':''} onclick="ansTF(false)">✗ 錯誤</button>
    </div>${ex}
  </div>`;
}
function ansTF(v){if(gs.a!==null)return;const ok=v===gs.qs[gs.i].ans;gs.a=v;if(ok)gs.s++;renderTF();}
function nextTF(){gs.i++;gs.a=null;renderTF();}

// ================================================================
//  MC
// ================================================================
function initMC(){
  const c=CATS.find(x=>x.id===curCat);
  gs={qs:sfl(c.MC).slice(0,Math.min(8,c.MC.length)),i:0,s:0,c:null};
  renderMC();
}
function renderMC(){
  const{qs,i,s,c}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  const opts=q.opts.map((o,j)=>{
    let cl='';if(c!==null){cl=j===q.ans?'mc':(j===c?'mw':'');}
    return`<button class="mc-btn ${cl}" ${c!==null?'disabled':''} onclick="ansMC(${j})">
      <span class="abadge">${['A','B','C','D'][j]}</span>${o}
    </button>`;
  }).join('');
  const ex=c!==null?`<div class="explain ${c===q.ans?'eo':'en'}">
    <span class="${c===q.ans?'eho':'ehn'}">${c===q.ans?'✅ 答對！':'❌ 答錯了'}</span>${q.e}
    <br><button class="next-btn" onclick="nextMC()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button>
  </div>`:'';
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterCat('${curCat}')">← 返回</button>
    <span class="mode-badge">📝 選擇練習</span>
    <button class="back-btn" onclick="initMC()" style="margin-left:auto;background:var(--parch)">↺ 重來</button>
  </div>
  ${pb(qs.length,i)}
  <div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div>
  <div class="card"><div class="q-box">${q.q}</div>${opts}${ex}</div>`;
}
function ansMC(j){if(gs.c!==null)return;gs.c=j;if(j===gs.qs[gs.i].ans)gs.s++;renderMC();}
function nextMC(){gs.i++;gs.c=null;renderMC();}

// ================================================================
//  MATCH
// ================================================================
function initMatch(){
  const c=CATS.find(x=>x.id===curCat);
  const pairs=pk(c.MATCH,Math.min(6,c.MATCH.length));
  gs={pairs,L:sfl(pairs.map(p=>p.l)),R:sfl(pairs.map(p=>p.r)),lS:null,rS:null,M:{},W:{},s:0,at:0};
  renderMatch();
}
function renderMatch(){
  const{pairs,L,R,lS,rS,M,W,s,at}=gs;
  function mi(v,sd,idx){
    const isSel=sd==='L'?lS===v:rS===v;
    const isM=M[v],isW=W[v];
    let cl='mi';
    if(isM)cl+=' mi-m';else if(isW)cl+=' mi-w';else if(isSel)cl+=' mi-s';
    const oc=isM?'':` onclick="selMatch('${sd}',${idx})"`;
    return`<div class="${cl}"${oc}>${esc(v)}</div>`;
  }
  const n=Math.max(L.length,R.length);
  let cells='';
  for(let i=0;i<n;i++){
    if(L[i])cells+=mi(L[i],'L',i);
    if(R[i])cells+=mi(R[i],'R',i);
  }
  const dm=s===pairs.length?`<div class="done-msg">🎉 全部配對完成！共嘗試 ${at} 次</div>`:'';
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterCat('${curCat}')">← 返回</button>
    <span class="mode-badge">🔗 配對遊戲</span>
    <button class="back-btn" onclick="initMatch()" style="margin-left:auto;background:var(--parch)">↺ 重來</button>
  </div>
  <div class="stat-row"><div class="chip">已配對 <strong>${s}</strong>/${pairs.length}</div><div class="chip">嘗試 <strong>${at}</strong> 次</div></div>
  <div class="card">
    <div class="match-hdr"><div>詞彙</div><div>說明</div></div>
    <div class="match-grid">${cells}</div>${dm}
  </div>`;
}
function selMatch(sd,idx){
  const g=gs;
  const v=sd==='L'?g.L[idx]:g.R[idx];
  if(!v||g.M[v])return;
  if(sd==='L')g.lS=g.lS===v?null:v;
  else g.rS=g.rS===v?null:v;
  if(g.lS&&g.rS){
    const p=g.pairs.find(x=>x.l===g.lS);
    const ok=p&&p.r===g.rS;
    g.at++;
    if(ok){g.M[g.lS]=true;g.M[g.rS]=true;g.s++;g.lS=null;g.rS=null;g.W={};}
    else{g.W={[g.lS]:true,[g.rS]:true};setTimeout(()=>{g.W={};g.lS=null;g.rS=null;renderMatch();},700);}
  }
  renderMatch();
}

// ================================================================
//  RESULT
// ================================================================
function showResult(s,t){
  const p=Math.round(s/t*100);
  const ic=p>=90?'🏆':p>=70?'⭐':p>=50?'🎵':'📖';
  const st=p>=90?'完美！全對達成！':p>=70?'很不錯！繼續加油！':p>=50?'還可以，多複習！':'加油！重新挑戰！';
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterCat('${curCat}')">← 返回分類</button>
  </div>
  <div class="card">
    <div class="result-box">
      <div class="ri">${ic}</div>
      <div class="rs">${st}</div>
      <div class="rsc">得分 ${s} / ${t}</div>
      <div class="rp">正確率 ${p}%</div><br>
      <button class="next-btn" onclick="enterMode('${curMode}')">↺ 再練習一次</button>
      <button class="next-btn" onclick="enterMode('ref')" style="margin-left:8px;background:var(--jade)">📋 速查手冊</button>
    </div>
  </div>`;
}
