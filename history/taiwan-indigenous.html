<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>臺灣原住民音樂史 · 互動學習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');

:root{
  --ink:#1a1a1a;
  --paper:#FDF6EC;
  --warm:#F5EAD4;
  --accent1:#C84B31;
  --accent2:#2E7D6B;
  --accent3:#8B4513;
  --gold:#D4920A;
  --shadow:rgba(0,0,0,0.15);
}

body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 20% 50%, rgba(200,75,49,0.04) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(46,125,107,0.04) 0%, transparent 50%),
    repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(0,0,0,0.04) 39px, rgba(0,0,0,0.04) 40px),
    repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(0,0,0,0.03) 39px, rgba(0,0,0,0.03) 40px);
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink);padding:16px;min-height:100vh;font-weight:500;
  max-width:760px;margin:0 auto;
}

/* HEADER */
.hd{text-align:center;margin-bottom:20px;padding:20px 0 10px}
.hd-badge{display:inline-block;background:var(--accent1);color:#fff;font-size:.7rem;font-weight:900;
  padding:4px 14px;border-radius:20px;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);
  margin-bottom:10px;letter-spacing:.1em;transform:rotate(-1deg)}
h1{font-family:'Noto Serif TC',serif;font-size:1.9rem;font-weight:900;color:var(--ink);
  line-height:1.3;margin-bottom:8px;letter-spacing:.02em}
h1 span{color:var(--accent1)}
.hd-sub{font-size:.78rem;color:#666;font-weight:600;letter-spacing:.06em;
  background:var(--warm);border:2px solid var(--ink);border-radius:12px;
  padding:4px 14px;display:inline-block;box-shadow:2px 2px 0 var(--ink)}

/* TRIBE GRID */
.tribe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;margin:18px 0}
.tribe-btn{padding:16px 10px;border-radius:16px;cursor:pointer;text-align:center;
  background:var(--ec,#888);border:3px solid var(--ink);box-shadow:5px 5px 0 var(--ink);
  transition:all .12s;color:#fff;position:relative;overflow:hidden}
.tribe-btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.08);
  opacity:0;transition:opacity .2s}
.tribe-btn:hover::before{opacity:1}
.tribe-btn:nth-child(3n+1){transform:rotate(-1.2deg)}
.tribe-btn:nth-child(3n+2){transform:rotate(.8deg)}
.tribe-btn:nth-child(3n){transform:rotate(-0.5deg)}
.tribe-btn:hover{transform:translate(-2px,-3px) rotate(0)!important;box-shadow:7px 8px 0 var(--ink)}
.tribe-btn:active{transform:translate(3px,3px) rotate(0)!important;box-shadow:1px 1px 0 var(--ink)}
.t-icon{font-size:2rem;margin-bottom:6px;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.4))}
.t-name{font-weight:900;font-size:1rem;margin-bottom:3px;text-shadow:2px 2px 0 rgba(0,0,0,.3);font-family:'Noto Serif TC',serif}
.t-en{font-size:.65rem;background:rgba(0,0,0,.7);padding:2px 8px;border-radius:8px;font-weight:700}
.t-num{font-size:.62rem;margin-top:4px;background:rgba(255,255,255,.2);padding:1px 6px;border-radius:6px}

/* OVERVIEW SECTION */
.overview-card{background:#fff;border:3px solid var(--ink);border-radius:16px;padding:16px;
  box-shadow:5px 5px 0 var(--ink);margin-bottom:18px;position:relative;transform:rotate(-.3deg)}
.ov-title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:1rem;
  background:var(--accent1);color:#fff;padding:5px 14px;border:2.5px solid var(--ink);
  border-radius:10px;box-shadow:3px 3px 0 var(--ink);display:inline-block;margin-bottom:12px}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov-item{background:var(--warm);border:2px solid var(--ink);border-radius:10px;padding:10px 12px}
.ov-h{font-weight:900;font-size:.8rem;color:var(--accent1);margin-bottom:5px}
.ov-list{font-size:.75rem;line-height:1.7;color:#333}
.ov-list li{list-style:none;padding-left:10px;position:relative}
.ov-list li::before{content:'▸';position:absolute;left:0;color:var(--accent2)}

/* QUICK REF TABLE */
.qref-wrap{overflow-x:auto;margin-top:10px}
.qref-table{width:100%;border-collapse:collapse;font-size:.72rem}
.qref-table th{background:var(--accent1);color:#fff;padding:7px 10px;border:2px solid var(--ink);
  font-weight:900;text-align:center;white-space:nowrap}
.qref-table td{padding:6px 10px;border:1.5px solid rgba(0,0,0,.25);vertical-align:top;line-height:1.6}
.qref-table tr:nth-child(even) td{background:var(--warm)}
.qref-table tr:hover td{background:rgba(200,75,49,.08)}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.back-btn{padding:8px 16px;border-radius:22px;cursor:pointer;font-size:.78rem;
  background:#fff;border:2.5px solid var(--ink);color:var(--ink);font-family:inherit;
  font-weight:800;box-shadow:3px 3px 0 var(--ink);transition:all .1s}
.back-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.back-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.mode-title{font-weight:900;font-size:.95rem;color:var(--ink);background:var(--gold);
  padding:5px 14px;border:2.5px solid var(--ink);border-radius:11px;box-shadow:3px 3px 0 var(--ink);
  color:#fff;text-shadow:1px 1px 0 rgba(0,0,0,.4)}

/* TRIBE BANNER */
.tribe-banner{padding:16px;border-radius:16px;margin-bottom:14px;background:var(--ec);
  border:3px solid var(--ink);color:#fff;box-shadow:6px 6px 0 var(--ink);
  position:relative;transform:rotate(-.4deg);overflow:hidden}
.tribe-banner::after{content:'';position:absolute;top:-20px;right:-20px;
  width:100px;height:100px;border:3px solid rgba(255,255,255,.2);border-radius:50%}
.tribe-banner h2{font-family:'Noto Serif TC',serif;font-size:1.4rem;margin-bottom:4px;
  font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.3)}
.tribe-banner .t-sub{display:inline-block;background:rgba(0,0,0,.7);padding:3px 12px;
  border-radius:8px;font-size:.72rem;font-weight:700;margin-bottom:8px}
.tribe-banner .t-intro{font-size:.82rem;line-height:1.65;font-weight:600;
  background:rgba(0,0,0,.15);border-radius:10px;padding:8px 12px;margin-top:6px}

/* MODE BUTTONS */
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:14px}
.mode-btn{padding:14px 10px;border-radius:14px;cursor:pointer;text-align:center;
  background:#fff;border:3px solid var(--ink);box-shadow:4px 4px 0 var(--ink);
  transition:all .12s;font-family:inherit}
.mode-btn:hover{transform:translate(-1px,-2px);box-shadow:5px 6px 0 var(--ink)}
.mode-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.m-icon{font-size:1.7rem;margin-bottom:6px}
.m-label{font-weight:900;font-size:.88rem;color:var(--ink);margin-bottom:3px}
.m-desc{color:#777;font-size:.67rem;font-weight:600}

/* INTRO SECTIONS */
.intro-sec{background:#fff;border:3px solid var(--ink);border-radius:16px;margin-bottom:14px;
  overflow:hidden;box-shadow:4px 4px 0 var(--ink)}
.intro-h{padding:10px 16px;font-weight:900;font-size:.9rem;color:#fff;
  background:var(--ec,var(--accent1));text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.intro-body{padding:14px 16px;font-size:.82rem;line-height:1.8;color:#333}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:12px}
.feat-card{background:var(--warm);border:2px solid var(--ink);border-radius:10px;padding:10px 12px}
.ft{font-weight:900;font-size:.85rem;margin-bottom:5px;color:var(--accent1)}
.fd{font-size:.76rem;line-height:1.65;color:#444}

/* INSTRUMENTS */
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;padding:12px}
.inst-card{background:var(--warm);border:2px solid var(--ink);border-radius:10px;padding:10px 12px;text-align:center}
.inst-icon{font-size:1.6rem;margin-bottom:5px}
.inst-name{font-weight:900;font-size:.85rem;color:var(--accent2);margin-bottom:4px}
.inst-desc{font-size:.72rem;color:#555;line-height:1.6}

/* LISTEN ITEMS */
.listen-item{padding:10px 16px;border-bottom:1.5px solid rgba(0,0,0,.12);display:flex;
  align-items:center;gap:12px;flex-wrap:wrap}
.listen-item:last-child{border-bottom:none}
.listen-info{flex:1;min-width:160px}
.listen-title{font-weight:900;font-size:.85rem;margin-bottom:2px;color:var(--ink)}
.listen-detail{font-size:.72rem;color:#666;line-height:1.5}
.yt-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:10px;background:#FF0000;color:#fff;font-size:.72rem;font-weight:900;
  text-decoration:none;border:2px solid var(--ink);box-shadow:3px 3px 0 var(--ink);
  transition:all .1s;white-space:nowrap;flex-shrink:0}
.yt-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}

/* TERM GRID */
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;padding:12px}
.term-card{background:var(--warm);border:2px solid var(--ink);border-radius:10px;padding:9px 12px}
.tt{font-weight:900;font-size:.85rem;color:var(--accent3);margin-bottom:3px}
.tz{font-size:.73rem;color:#444;line-height:1.6}

/* QUICK REF */
.ref-item{border-bottom:2px solid rgba(0,0,0,.12)}
.ref-item:last-child{border-bottom:none}
.ref-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;
  transition:background .15s;border-radius:4px}
.ref-head:hover{background:var(--warm)}
.ref-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;font-weight:900;color:#fff;border:2.5px solid var(--ink);flex-shrink:0}
.ref-name{font-weight:900;font-size:.9rem}
.ref-detail{font-size:.7rem;color:#666;margin-top:1px}
.ref-badge{padding:3px 10px;border-radius:8px;font-size:.65rem;font-weight:900;color:#fff;
  margin-left:auto;border:1.5px solid var(--ink);white-space:nowrap;flex-shrink:0}
.ref-arr{font-size:.8rem;color:#888;flex-shrink:0}
.ref-body{padding:0 16px 14px 60px}
.ref-body li{font-size:.78rem;line-height:1.8;color:#333;list-style:none;padding-left:14px;position:relative}
.ref-body li::before{content:'♪';position:absolute;left:0;color:var(--accent2)}

/* QUIZ */
.q-box{background:var(--warm);border:3px solid var(--ink);border-radius:14px;padding:14px 17px;
  font-size:.9rem;color:var(--ink);line-height:1.7;margin-bottom:14px;font-weight:600;
  box-shadow:3px 3px 0 var(--ink)}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tf-btn{padding:14px;border-radius:13px;border:3px solid var(--ink);background:#fff;color:var(--ink);
  font-size:1rem;cursor:pointer;font-family:inherit;font-weight:900;transition:all .1s;
  box-shadow:4px 4px 0 var(--ink)}
.tf-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:5px 5px 0 var(--ink)}
.tf-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.tc{background:#2ED573!important;color:#fff!important}
.tw{background:#FF4757!important;color:#fff!important}
.mc-btn{display:flex;align-items:center;gap:10px;width:100%;padding:11px 14px;border-radius:12px;
  margin-bottom:9px;border:3px solid var(--ink);background:#fff;color:var(--ink);font-size:.85rem;
  cursor:pointer;font-family:inherit;text-align:left;transition:all .1s;font-weight:700;
  box-shadow:3px 3px 0 var(--ink)}
.mc-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.mc{background:#2ED573!important;color:#fff!important}
.mw{background:#FF4757!important;color:#fff!important}
.abadge{width:26px;height:26px;border-radius:50%;background:var(--gold);border:2px solid var(--ink);
  display:inline-flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:900;flex-shrink:0;color:#fff}
.mc .abadge,.mw .abadge{background:rgba(255,255,255,.3)}
.explain{margin-top:12px;padding:14px 16px;border-radius:12px;font-size:.8rem;line-height:1.65;
  font-weight:600;border:3px solid var(--ink);box-shadow:3px 3px 0 var(--ink)}
.eo{background:#D6FFE6}.en{background:#FFE0E3}
.eho,.ehn{font-weight:900;display:block;margin-bottom:5px;font-size:.9rem}
.eho{color:#0F8C40}.ehn{color:#C8243A}
.next-btn{margin-top:10px;padding:8px 22px;border-radius:18px;cursor:pointer;
  background:var(--gold);border:2.5px solid var(--ink);color:#fff;font-size:.84rem;
  font-family:inherit;font-weight:900;box-shadow:3px 3px 0 var(--ink);transition:all .1s;
  text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.next-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.next-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.prog-bar{display:flex;gap:4px;margin-bottom:14px;background:#fff;padding:5px;
  border:2.5px solid var(--ink);border-radius:10px;box-shadow:3px 3px 0 var(--ink)}
.prog-seg{flex:1;height:9px;border-radius:3px;background:#ddd;border:1.5px solid var(--ink);transition:background .3s}
.pd{background:#2ED573!important}.pc{background:var(--gold)!important}
.stat-row{display:flex;justify-content:center;gap:10px;margin-bottom:13px;flex-wrap:wrap}
.chip{background:#fff;border:2.5px solid var(--ink);border-radius:14px;padding:5px 14px;
  font-size:.78rem;color:var(--ink);font-weight:800;box-shadow:2px 2px 0 var(--ink)}
.chip strong{color:var(--accent1)}
.result-box{text-align:center;padding:20px}
.ri{font-size:3.5rem;margin-bottom:8px}
.rs{font-family:'Noto Serif TC',serif;font-size:1.5rem;font-weight:900;margin-bottom:4px}
.rsc{font-size:1rem;font-weight:700;color:var(--accent1);margin-bottom:4px}
.rp{font-size:.85rem;color:#666;font-weight:600}

.card{background:#fff;border:3px solid var(--ink);border-radius:16px;padding:14px;box-shadow:4px 4px 0 var(--ink)}

/* MATCH GAME */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.match-hdr{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;
  text-align:center;font-size:.78rem;font-weight:900;color:#fff}
.match-hdr div{background:var(--accent2);border:2px solid var(--ink);border-radius:8px;padding:5px;box-shadow:2px 2px 0 var(--ink)}
.mi{padding:10px;border-radius:10px;border:2.5px solid var(--ink);background:#fff;
  cursor:pointer;font-size:.78rem;font-weight:700;text-align:center;transition:all .15s;
  box-shadow:3px 3px 0 var(--ink);line-height:1.4;min-height:44px;display:flex;align-items:center;justify-content:center}
.mi:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.mi-s{background:var(--gold)!important;color:#fff!important;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.mi-m{background:#2ED573!important;color:#fff!important;cursor:default;box-shadow:none;transform:none}
.mi-w{background:#FF4757!important;color:#fff!important}
.done-msg{text-align:center;padding:14px;font-weight:900;font-size:1rem;color:var(--accent2);
  background:#D6FFE6;border:2px solid var(--ink);border-radius:10px;margin-top:10px}

/* TIP BOX */
.tip{background:#fff;border:3px solid var(--ink);border-radius:16px;padding:14px 18px;
  font-size:.8rem;color:var(--ink);line-height:1.7;font-weight:600;box-shadow:4px 4px 0 var(--ink);
  margin-top:8px;position:relative}
.tip::before{content:"💡 學習提示";position:absolute;top:-13px;left:18px;background:var(--gold);
  color:#fff;padding:2px 12px;border:2.5px solid var(--ink);border-radius:10px;font-size:.72rem;font-weight:900;
  text-shadow:1px 1px 0 rgba(0,0,0,.3)}

/* SCROLL TO TOP */
.scroll-top{position:fixed;bottom:20px;right:20px;background:var(--accent1);color:#fff;
  border:2.5px solid var(--ink);border-radius:50%;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:1.2rem;box-shadow:3px 3px 0 var(--ink);transition:all .1s;z-index:100}
.scroll-top:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}

/* CATEGORY TAG */
.cat-tag{display:inline-block;font-size:.65rem;font-weight:900;padding:2px 8px;
  border-radius:8px;border:1.5px solid var(--ink);margin-left:6px;vertical-align:middle}

@media(max-width:500px){
  h1{font-size:1.5rem}
  .tribe-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .ov-grid{grid-template-columns:1fr}
}
</style>

<script>
// ============================================================
//  DATA — Tribe definitions
// ============================================================
const TRIBES = [
  {id:'atayal', name:'泰雅族', en:'Atayal, Tayal', icon:'🏹', num:'第一族', color:'#C84B31',
   intro:'最早來臺的民族之一，以傳統狩獵和游耕維生。日據時代抗日受創嚴重，傳統文化流失最多。脸部有族群標記的刺黥，被稱為「北番」、「黥面番」。',
   social:['最早來臺的民族之一，以狩獵和游耕維生','日據時代抗日受創嚴重，傳統文化流失最多','傳統儀式服飾技術繁複，花色精美，有貝殼珠鑲織','臉部有族群標記的刺黥（黥面）'],
   music:['音域狹窄、曲調簡單，有蒼涼孤獨的感覺','以吟誦性歌曲為主','口傳心授，缺乏記錄'],
   instruments:['口黃琴（傳話、舞蹈伴奏、吹奏樂器）','口笛','木鼓','木琴'],
   festivals:['祖靈祭（農曆7月）','豐年祭','播種祭'],
   listen:[
     {title:'泰雅族口黃琴演奏',detail:'口黃琴（竹簧琴）是泰雅族最具代表性的傳話樂器',q:'泰雅族 口黃琴'},
     {title:'泰雅族吟唱',detail:'泰雅族傳統吟唱，音域狹窄但蒼涼深遠',q:'泰雅族 傳統歌謠'},
     {title:'泰雅族豐年祭歌舞',detail:'豐年祭是重要的農耕祭典',q:'泰雅族 豐年祭'},
   ],

}

  curMode=mode;

  else if(mode==='tf') initTF();
  else if(mode==='mc') initMC();
  else if(mode==='match') initMatch();
}

  <div class="card" style="margin-bottom:12px">
    <div style="font-size:.75rem;color:#888;margin-bottom:10px;font-weight:600">點擊項目展開重點整理</div>
    ${cards}
  </div>
  <div class="intro-sec">
    <div class="intro-h" style="--ec:${c}">📚 重要術語速查</div>
    <div class="term-grid">${termCards}</div>
  </div>
  `;
}
function tgRef(i){
  const b=document.getElementById('b'+i),a=document.getElementById('a'+i);
  if(!b)return;
  const o=b.style.display!=='none';
  b.style.display=o?'none':'block';
  if(a)a.textContent=o?'▼':'▲';
}

// ============================================================
//  TF QUIZ
// ============================================================
function initTF(){
  const t=TRIBES.find(x=>x.id===curTribe);
  gs={qs:sfl(t.TF).slice(0,Math.min(8,t.TF.length)),i:0,s:0,a:null};
  renderTF();
}
function renderTF(){
  const{qs,i,s,a}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  let t0='',t1='';
  if(a!==null){t0=q.ans===true?'tc':(a===true?'tw':'');t1=q.ans===false?'tc':(a===false?'tw':'');}
  const ex=a!==null?`<div class="explain ${a===q.ans?'eo':'en'}">
    <span class="${a===q.ans?'eho':'ehn'}">${a===q.ans?'✅ 答對啦！':'❌ 答錯了'}</span>${q.e}
    <br><button class="next-btn" onclick="nextTF()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button>
  </div>`:'';
  document.getElementById('app').innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterTribe('${curTribe}')">← 返回</button>
    <span class="mode-title">⭕ 是非練習</span>
    <button class="back-btn" onclick="initTF()" style="margin-left:auto;background:var(--warm)">↺ 重來</button>
  </div>
  ${pb(qs.length,i)}
  <div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div>
  <div class="card">
    <div class="q-box" style="background:var(--warm)">${q.q}</div>
    <div class="tf-btns">
      <button class="tf-btn ${t0}" ${a!==null?'disabled':''} onclick="ansTF(true)">○ 正確</button>
      <button class="tf-btn ${t1}" ${a!==null?'disabled':''} onclick="ansTF(false)">✗ 錯誤</button>
    </div>
    ${ex}
  </div>`;
}
function ansTF(v){if(gs.a!==null)return;const ok=v===gs.qs[gs.i].ans;gs.a=v;if(ok)gs.s++;renderTF();}
function nextTF(){gs.i++;gs.a=null;renderTF();}

// ============================================================
//  MC QUIZ
// ============================================================
function initMC(){
  const t=TRIBES.find(x=>x.id===curTribe);
  gs={qs:sfl(t.MC).slice(0,Math.min(8,t.MC.length)),i:0,s:0,c:null};
  renderMC();
}
function renderMC(){
  const{qs,i,s,c}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  const opts=q.opts.map((o,j)=>{
    let cl='';if(c!==null){cl=j===q.ans?'mc':(j===c?'mw':'');}
    return`<button class="mc-btn ${cl}" ${c!==null?'disabled':''} onclick="ansMC(${j})">
      <span class="abadge">${['A','B','C','D'][j]}</span>${o}
    </button>`;
  }).join('');
  const ex=c!==null?`<div class="explain ${c===q.ans?'eo':'en'}">
    <span class="${c===q.ans?'eho':'ehn'}">${c===q.ans?'✅ 答對啦！':'❌ 答錯了'}</span>${q.e}
    <br><button class="next-btn" onclick="nextMC()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button>
  </div>`:'';
  document.getElementById('app').innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterTribe('${curTribe}')">← 返回</button>
    <span class="mode-title">📝 選擇練習</span>
    <button class="back-btn" onclick="initMC()" style="margin-left:auto;background:var(--warm)">↺ 重來</button>
  </div>
  ${pb(qs.length,i)}
  <div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div>
  <div class="card">
    <div class="q-box" style="background:var(--warm)">${q.q}</div>
    ${opts}${ex}
  </div>`;
}
function ansMC(j){if(gs.c!==null)return;gs.c=j;if(j===gs.qs[gs.i].ans)gs.s++;renderMC();}
function nextMC(){gs.i++;gs.c=null;renderMC();}

// ============================================================
//  MATCH GAME
// ============================================================
function initMatch(){
  const t=TRIBES.find(x=>x.id===curTribe);
  const pairs=pk(t.MATCH,Math.min(6,t.MATCH.length));
  gs={pairs,L:sfl(pairs.map(p=>p.l)),R:sfl(pairs.map(p=>p.r)),lS:null,rS:null,M:{},W:{},s:0,at:0};
  renderMatch();
}
function renderMatch(){
  const{pairs,L,R,lS,rS,M,W,s,at}=gs;
  function mi(v,sd,idx){
    const isSel=sd==='L'?lS===v:rS===v;
    const isM=M[v],isW=W[v];
    let cl='mi';
    if(isM)cl+=' mi-m';else if(isW)cl+=' mi-w';else if(isSel)cl+=' mi-s';
    const oc=isM?'':` onclick="selMatch('${sd}',${idx})"`;
    return`<div class="${cl}"${oc}>${esc(v)}</div>`;
  }
  const n=Math.max(L.length,R.length);
  let cells='';
  for(let i=0;i<n;i++){
    if(L[i])cells+=mi(L[i],'L',i);
    if(R[i])cells+=mi(R[i],'R',i);
  }
  const dm=s===pairs.length?`<div class="done-msg">🎉 全部配對完成！共嘗試 ${at} 次</div>`:'';
  const t=TRIBES.find(x=>x.id===curTribe);
  document.getElementById('app').innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterTribe('${curTribe}')">← 返回</button>
    <span class="mode-title">🔗 配對遊戲</span>
    <button class="back-btn" onclick="initMatch()" style="margin-left:auto;background:var(--warm)">↺ 重來</button>
  </div>
  <div class="stat-row"><div class="chip">已配對 <strong>${s}</strong>/${pairs.length}</div><div class="chip">嘗試 <strong>${at}</strong> 次</div></div>
  <div class="card">
    <div class="match-hdr"><div>左欄詞彙</div><div>右欄說明</div></div>
    <div class="match-grid">${cells}</div>
    ${dm}
  </div>`;
}
function selMatch(sd,idx){
  const g=gs;
  const v=sd==='L'?g.L[idx]:g.R[idx];
  if(!v||g.M[v])return;
  if(sd==='L')g.lS=g.lS===v?null:v;
  else g.rS=g.rS===v?null:v;
  if(g.lS&&g.rS){
    const p=g.pairs.find(x=>x.l===g.lS);
    const ok=p&&p.r===g.rS;
    g.at++;
    if(ok){g.M[g.lS]=true;g.M[g.rS]=true;g.s++;g.lS=null;g.rS=null;g.W={};}
    else{g.W={[g.lS]:true,[g.rS]:true};setTimeout(()=>{g.W={};g.lS=null;g.rS=null;renderMatch();},700);}
  }
  renderMatch();
}

// ============================================================
//  RESULT
// ============================================================
function showResult(s,t){
  const p=Math.round(s/t*100);
  const ic=p>=90?'🏆':p>=70?'⭐':p>=50?'🎵':'📖';
  const st=p>=90?'完美！滿分達成！':p>=70?'很不錯！繼續加油！':p>=50?'還可以，再複習一下':p>=10?'需要加強，多看幾次！':'加油！重新挑戰！';
  document.getElementById('app').innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterTribe('${curTribe}')">← 返回族群</button>
  </div>
  <div class="card">
    <div class="result-box">
      <div class="ri">${ic}</div>
      <div class="rs">${st}</div>
      <div class="rsc">得分 ${s} / ${t}</div>
      <div class="rp">正確率 ${p}%</div>
      <br>
      <button class="next-btn" onclick="enterMode('${curMode}')">↺ 再練習一次</button>
      <button class="next-btn" onclick="enterMode('ref')" style="margin-left:8px;background:var(--accent2)">📋 查看速查手冊</button>
    </div>
  </div>`;
}
