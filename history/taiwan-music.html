<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>台灣戲曲與音樂史 · 互動學習手冊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
:root{
  --ink:#1a1a1a;
  --paper:#FEF9F0;
  --red:#C0392B;
  --darkred:#8B1A1A;
  --gold:#E6A817;
  --green:#1E7A4A;
  --blue:#1B5E8A;
  --purple:#5B2D8E;
}
body{
  background:var(--paper);
  background-image:
    radial-gradient(circle at 20% 20%, rgba(198,71,33,.04) 0, transparent 60%),
    radial-gradient(circle at 80% 80%, rgba(27,94,138,.04) 0, transparent 60%),
    repeating-linear-gradient(0deg,transparent,transparent 29px,rgba(160,100,40,.08) 29px,rgba(160,100,40,.08) 30px);
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  color:var(--ink);padding:14px;min-height:100vh;font-weight:500
}
/* HEADER */
.hd{text-align:center;margin-bottom:18px}
.hd-title{display:inline-block;position:relative}
.hd-title h1{
  font-size:1.85rem;color:#fff;
  background:linear-gradient(135deg,#7D1A1A 0%,#C0392B 50%,#7D1A1A 100%);
  padding:10px 28px 10px 24px;
  border:3px solid #5D0E0E;border-radius:3px;
  box-shadow:5px 5px 0 #5D0E0E,0 0 0 6px rgba(192,57,43,.12);
  font-weight:900;letter-spacing:.1em;
  font-family:'Noto Serif TC',serif;line-height:1.25
}
.hd-deco{font-size:1.15rem;opacity:.75;margin:0 6px;vertical-align:middle}
.sub{display:inline-block;margin-top:11px;background:var(--gold);color:#5D0E0E;
  padding:4px 18px;border:2.5px solid #5D0E0E;border-radius:2px;
  font-size:.75rem;font-weight:800;box-shadow:3px 3px 0 #5D0E0E;letter-spacing:.1em}

/* ERA GRID */
.era-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:13px;margin:18px 0 14px}
.era-btn{
  padding:15px 10px;border-radius:3px;cursor:pointer;text-align:center;
  background:var(--ec);border:3px solid rgba(0,0,0,.55);
  box-shadow:5px 5px 0 rgba(0,0,0,.45);
  transition:all .13s;color:#fff;position:relative;overflow:hidden
}
.era-btn::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 5px,rgba(255,255,255,.05) 5px,rgba(255,255,255,.05) 10px);pointer-events:none}
.era-btn:hover{transform:translate(-2px,-2px);box-shadow:7px 7px 0 rgba(0,0,0,.45)}
.era-btn:active{transform:translate(3px,3px);box-shadow:1px 1px 0 rgba(0,0,0,.45)}
.eicon{font-size:1.9rem;margin-bottom:5px;filter:drop-shadow(2px 2px 0 rgba(0,0,0,.4))}
.elabel{font-weight:900;font-size:.9rem;margin-bottom:4px;line-height:1.3;text-shadow:2px 2px 0 rgba(0,0,0,.4);font-family:'Noto Serif TC',serif;letter-spacing:.05em}
.eyrs{font-size:.65rem;background:rgba(0,0,0,.72);padding:2px 8px;border-radius:2px;display:inline-block;font-weight:700;letter-spacing:.04em}

/* MODE GRID */
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(126px,1fr));gap:9px;margin-bottom:12px}
.mode-btn{padding:13px 9px;border-radius:3px;cursor:pointer;text-align:center;
  background:#fff;border:3px solid #333;box-shadow:4px 4px 0 #333;transition:all .12s;font-weight:800}
.mode-btn:hover{transform:translate(-1px,-1px);box-shadow:5px 5px 0 #333}
.mode-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #333}
.micon{font-size:1.55rem;margin-bottom:4px}
.mlabel{font-weight:900;font-size:.85rem;color:var(--ink);margin-bottom:2px;font-family:'Noto Serif TC',serif}
.mdesc{color:#666;font-size:.65rem;font-weight:600}

/* CARD / BANNER */
.card{background:#fff;border:3px solid #333;border-radius:3px;padding:14px;box-shadow:4px 4px 0 #333}
.era-banner{padding:13px 15px;border-radius:3px;margin-bottom:13px;background:var(--ec);
  border:3px solid rgba(0,0,0,.5);color:#fff;box-shadow:5px 5px 0 rgba(0,0,0,.4);position:relative;overflow:hidden}
.era-banner::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(-45deg,transparent,transparent 7px,rgba(255,255,255,.04) 7px,rgba(255,255,255,.04) 14px);pointer-events:none}
.era-banner h2{font-size:1.15rem;margin-bottom:3px;font-weight:900;text-shadow:2px 2px 0 rgba(0,0,0,.4);line-height:1.3;font-family:'Noto Serif TC',serif;letter-spacing:.07em}
.era-banner .esub{display:inline-block;background:rgba(0,0,0,.7);padding:2px 10px;border-radius:2px;font-size:.7rem;font-weight:700;letter-spacing:.05em;margin-bottom:7px}
.era-banner .eintro{font-size:.79rem;line-height:1.65;font-weight:600}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:9px;margin-bottom:13px;flex-wrap:wrap}
.back-btn,.restart-btn{padding:7px 14px;border-radius:2px;cursor:pointer;font-size:.76rem;
  background:#fff;border:2.5px solid #333;color:var(--ink);font-family:inherit;
  font-weight:800;box-shadow:3px 3px 0 #333;transition:all .1s}
.back-btn:hover,.restart-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #333}
.back-btn:active,.restart-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #333}
.restart-btn{margin-left:auto;background:var(--gold);color:#5D0E0E}
.mode-title{font-weight:900;font-size:.9rem;color:#fff;background:var(--ec,#8B1A1A);
  padding:5px 13px;border:2.5px solid rgba(0,0,0,.5);border-radius:2px;
  box-shadow:3px 3px 0 rgba(0,0,0,.38);font-family:'Noto Serif TC',serif;letter-spacing:.05em}

/* TIP */
.tip{background:#fff;border:3px solid #333;border-radius:3px;padding:13px 16px;
  font-size:.8rem;color:var(--ink);line-height:1.7;font-weight:600;box-shadow:4px 4px 0 #333;
  position:relative;margin-top:8px}
.tip::before{content:"📜 學習小提示";position:absolute;top:-13px;left:16px;background:var(--gold);
  color:#5D0E0E;padding:2px 11px;border:2.5px solid #333;border-radius:2px;font-size:.7rem;font-weight:900}

/* PROGRESS */
.prog-bar{display:flex;gap:3px;margin-bottom:13px;background:#fff;padding:5px;
  border:2.5px solid #333;border-radius:3px;box-shadow:3px 3px 0 #333}
.prog-seg{flex:1;height:8px;border-radius:2px;background:#eee;border:1.5px solid #aaa;transition:background .3s}
.pd{background:#2aab6f!important}.pc{background:var(--gold)!important}
.stat-row{display:flex;justify-content:center;gap:9px;margin-bottom:12px;flex-wrap:wrap}
.chip{background:#fff;border:2.5px solid #333;border-radius:2px;padding:4px 12px;
  font-size:.76rem;color:var(--ink);font-weight:800;box-shadow:2px 2px 0 #333}
.chip strong{color:var(--red)}

/* QUIZ */
.q-box{background:var(--paper);border:3px solid #333;border-radius:3px;padding:13px 16px;
  font-size:.9rem;color:var(--ink);line-height:1.75;margin-bottom:13px;font-weight:600;
  box-shadow:3px 3px 0 #333;position:relative}
.q-box::before{content:"問";position:absolute;top:-14px;left:13px;background:var(--red);color:#fff;
  width:28px;height:28px;border:2.5px solid #333;border-radius:50%;font-weight:900;font-size:.85rem;
  font-family:'Noto Serif TC',serif;display:flex;align-items:center;justify-content:center;box-shadow:2px 2px 0 #333}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tf-btn{padding:13px;border-radius:3px;border:3px solid #333;background:#fff;color:var(--ink);
  font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:900;transition:all .1s;
  box-shadow:4px 4px 0 #333}
.tf-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:5px 5px 0 #333}
.tf-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 #333}
.tc{background:#2aab6f!important;color:#fff!important;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.tw{background:var(--red)!important;color:#fff!important;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.mc-btn{display:flex;align-items:center;gap:9px;width:100%;padding:10px 13px;border-radius:3px;
  margin-bottom:8px;border:3px solid #333;background:#fff;color:var(--ink);font-size:.84rem;
  cursor:pointer;font-family:inherit;text-align:left;transition:all .1s;font-weight:700;
  box-shadow:3px 3px 0 #333}
.mc-btn:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:4px 4px 0 #333}
.mc-btn:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 #333}
.mc{background:#2aab6f!important;color:#fff!important;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.mw{background:var(--red)!important;color:#fff!important;text-shadow:1px 1px 0 rgba(0,0,0,.3)}
.abadge{width:25px;height:25px;border-radius:50%;background:var(--gold);border:2px solid #333;
  display:inline-flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;flex-shrink:0;color:#5D0E0E}
.mc .abadge,.mw .abadge{background:rgba(255,255,255,.85);color:#333}
.explain{margin-top:11px;padding:13px 15px;border-radius:3px;font-size:.8rem;line-height:1.65;
  font-weight:600;border:3px solid #333;box-shadow:3px 3px 0 #333}
.eo{background:#D6FFE6}.en{background:#FFE0E3}
.eho,.ehn{font-weight:900;display:block;margin-bottom:4px;font-size:.88rem}
.eho{color:#0F8C40}.ehn{color:var(--red)}
.next-btn{margin-top:9px;padding:7px 20px;border-radius:2px;cursor:pointer;
  background:var(--gold);border:2.5px solid #333;color:#5D0E0E;font-size:.82rem;
  font-family:inherit;font-weight:900;box-shadow:3px 3px 0 #333;transition:all .1s}
.next-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 #333}
.next-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 #333}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.match-hdr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:7px;text-align:center;font-size:.76rem;font-weight:900;color:var(--darkred)}
.mi{padding:9px 8px;border-radius:3px;border:2.5px solid #bbb;background:#f9f9f9;
  font-size:.76rem;text-align:center;cursor:pointer;transition:all .12s;font-weight:700;min-height:42px;display:flex;align-items:center;justify-content:center;line-height:1.4}
.mi:hover{border-color:var(--red)}
.mi-s{border-color:var(--red)!important;background:#FEF5F5!important;box-shadow:2px 2px 0 var(--red)}
.mi-m{background:#D6FFE6!important;border-color:#2aab6f!important;cursor:default}
.mi-w{background:#FFE0E3!important;border-color:var(--red)!important}
.done-msg{text-align:center;padding:13px;font-weight:900;color:#2aab6f;font-size:.92rem;margin-top:9px;font-family:'Noto Serif TC',serif}
.result-box{text-align:center;padding:18px 10px}
.ri{font-size:3.2rem;margin-bottom:7px}.rs{font-size:1.25rem;font-weight:900;margin-bottom:5px;font-family:'Noto Serif TC',serif}
.rsc{font-size:.98rem;font-weight:700;color:var(--red);margin-bottom:4px}.rp{font-size:.88rem;color:#666;font-weight:700}

/* INTRO STYLES */
.intro-sec{margin-bottom:16px}
.intro-h{background:var(--ec,#8B1A1A);color:#fff;padding:7px 13px;border-radius:2px;
  font-weight:900;font-size:.86rem;margin-bottom:9px;border:2.5px solid rgba(0,0,0,.45);
  box-shadow:3px 3px 0 rgba(0,0,0,.35);font-family:'Noto Serif TC',serif;letter-spacing:.05em}
.intro-body{background:#fff;border:2.5px solid #ddd;border-radius:3px;padding:11px;
  font-size:.8rem;line-height:1.75;font-weight:600;box-shadow:2px 2px 0 #ddd;color:#333}
.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:9px}
.feat-card{background:#fff;border:2.5px solid #ddd;border-radius:3px;padding:10px;box-shadow:2px 2px 0 #ddd}
.ft{font-weight:900;font-size:.83rem;color:var(--ec,#8B1A1A);margin-bottom:4px;font-family:'Noto Serif TC',serif}
.fd{font-size:.76rem;line-height:1.65;color:#444;font-weight:600}
.term-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:7px}
.term-card{background:var(--paper);border:2px solid #e8d5a0;border-radius:3px;padding:8px 11px;display:flex;gap:7px;align-items:flex-start}
.tt{font-weight:900;font-size:.83rem;color:var(--ec,#8B1A1A);white-space:nowrap;min-width:fit-content;font-family:'Noto Serif TC',serif}
.tz{font-size:.74rem;line-height:1.6;color:#555;font-weight:600}
.listen-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-bottom:1.5px dashed #ddd;flex-wrap:wrap}
.listen-item:last-child{border-bottom:none}
.listen-title{font-weight:900;font-size:.83rem;color:var(--ink);flex:1;min-width:110px;font-family:'Noto Serif TC',serif}
.listen-comp{font-size:.74rem;color:#666;font-weight:600;margin-right:3px}
.yt-btn{display:inline-block;background:var(--red);color:#fff;padding:3px 11px;border-radius:2px;
  font-size:.7rem;font-weight:900;text-decoration:none;white-space:nowrap;
  border:2px solid var(--darkred);box-shadow:2px 2px 0 var(--darkred);transition:all .1s}
.yt-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--darkred)}

/* REF */
.ref-item{border:2.5px solid #ddd;border-radius:3px;margin-bottom:7px;overflow:hidden;box-shadow:2px 2px 0 #ddd}
.ref-head{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;background:#fafafa;transition:background .1s}
.ref-head:hover{background:var(--paper)}
.ref-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:900;font-size:.95rem;font-family:'Noto Serif TC',serif;flex-shrink:0;border:2px solid rgba(0,0,0,.28)}
.ref-name{font-weight:900;font-size:.86rem;color:var(--ink);font-family:'Noto Serif TC',serif}
.ref-sub{font-size:.7rem;color:#777;font-weight:600}
.ref-badge{display:inline-block;color:#fff;font-size:.64rem;font-weight:900;padding:2px 8px;border-radius:2px;margin-left:auto;white-space:nowrap}
.ref-arr{font-size:.82rem;color:#aaa;margin-left:7px}
.ref-body{padding:11px 15px;background:#fff;font-size:.78rem;line-height:1.75;font-weight:600}
.ref-body li{margin-bottom:5px;padding-left:11px;position:relative;color:#333}
.ref-body li::before{content:'◆';position:absolute;left:0;color:var(--ec,#8B1A1A);font-size:.58rem;top:5px}

/* TIMELINE */
.tl{padding:6px 0}
.tl-item{display:flex;gap:11px;align-items:flex-start;margin-bottom:13px;position:relative;padding-left:3px}
.tl-item::before{content:'';position:absolute;left:48px;top:17px;bottom:-13px;width:2px;background:var(--ec,#8B1A1A);opacity:.28}
.tl-item:last-child::before{display:none}
.tl-yr{background:var(--ec,#8B1A1A);color:#fff;padding:3px 7px;border-radius:2px;font-size:.7rem;font-weight:900;white-space:nowrap;min-width:50px;text-align:center;flex-shrink:0;margin-top:2px;box-shadow:2px 2px 0 rgba(0,0,0,.32);font-family:'Noto Serif TC',serif}
.tl-tx{font-size:.78rem;line-height:1.7;font-weight:600;color:#333;background:#fff;border:2px solid #e0d0b0;border-radius:3px;padding:7px 11px;box-shadow:2px 2px 0 #e0d0b0;flex:1}

/* QREF TABLE */
.qref-sec{margin-bottom:15px}
.qref-title{font-weight:900;font-size:.83rem;color:var(--ec,#8B1A1A);background:var(--paper);
  padding:6px 11px;border:2px solid var(--ec,#8B1A1A);border-radius:2px;margin-bottom:7px;font-family:'Noto Serif TC',serif}
.qref-table{width:100%;border-collapse:collapse;font-size:.76rem}
.qref-table th{background:var(--ec,#8B1A1A);color:#fff;padding:6px 9px;text-align:left;font-weight:900;font-family:'Noto Serif TC',serif;font-size:.74rem}
.qref-table td{padding:6px 9px;border-bottom:1.5px solid #eee;font-weight:600;color:#333;vertical-align:top;line-height:1.6;font-size:.74rem}
.qref-table tr:nth-child(even) td{background:var(--paper)}
.qref-table tr:hover td{background:#fef8ee}

/* COMPARE TABLE */
.cmp-table{width:100%;border-collapse:collapse;font-size:.73rem;margin-top:6px}
.cmp-table th{background:var(--ec,#8B1A1A);color:#fff;padding:5px 8px;text-align:center;font-weight:900;font-family:'Noto Serif TC',serif}
.cmp-table td{padding:5px 8px;border:1.5px solid #ddd;font-weight:600;color:#333;vertical-align:top;line-height:1.5;text-align:center}
.cmp-table tr:nth-child(even) td{background:var(--paper)}

/* TAG BADGE */
.tag{display:inline-block;font-size:.65rem;font-weight:900;padding:1px 7px;border-radius:10px;border:1.5px solid;margin-right:3px;margin-bottom:3px}
.tag-red{background:#FFE0E0;color:var(--red);border-color:var(--red)}
.tag-blue{background:#E0EEFF;color:var(--blue);border-color:var(--blue)}
.tag-green{background:#E0FFE8;color:var(--green);border-color:var(--green)}
.tag-gold{background:#FFF4CC;color:#886600;border-color:#E6A817}
.tag-purple{background:#F0E8FF;color:var(--purple);border-color:var(--purple)}
</style>

<script>
// ===== ERA DATA =====
const ERAS=[
  {id:'puppet',name:'偶戲',icon:'🎪',years:'皮影・傀儡・掌中戲',color:'#7B3F00',sub:'台灣偶戲三大系統',
   intro:'台灣偶戲包含皮影戲、傀儡戲和掌中戲（布袋戲），是最具台灣本土特色的傳統表演藝術。三種偶戲各有獨特音樂唱腔和操偶技巧，均已列為重要文化資產，其中掌中戲更發展出電視布袋戲等現代形式。'},

        ['第3屆（1992）','春天從愛情來','李泰祥（最佳編曲人）'],
        ['第8屆（1997）','擊鼓','鐘南章'],
        ['第9屆（1998）','馬蘭姑娘','鐘南章'],
        ['第12屆（2001）','臥虎藏龍（永恒的誓約）','譚盾'],
        ['第13屆（2002）','佛說阿彌陀經','鐘南章'],
        ['第15屆（2004）','清唱劇：浪子','蕭泰然'],
        ['第16屆（2005）','號聲響起（第一號交響曲）','鐘南章']
      ]}
    ]},
    TIMELINE:[
      {y:'1979年',t:'吳三連獎第2屆藝術獎音樂類：許常惠'},
      {y:'1980年',t:'吳三連獎第3屆音樂類：馬水龍'},
      {y:'1984年',t:'吳三連獎第7屆音樂類：賴德和'},
      {y:'1997年',t:'第一屆國家文藝獎設立，音樂類：杜黑'},
      {y:'1998年',t:'第二屆國家文藝獎：盧炎（音樂）；廖瓊枝（戲劇）'},
      {y:'1999年',t:'第三屆國家文藝獎音樂類：馬水龍'},
      {y:'2006年',t:'第十屆國家文藝獎：郭芝苑（作曲）；黃俊雄（布袋戲）'},
      {y:'2012年',t:'第十六屆：唐美雲（歌仔戲）；賴碧霞（客家民謠）'}
    ]
  }
};

// ===== UTILITY =====
let curEra=null,mode=null,gs={};
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function sfl(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function pk(a,n){return sfl(a).slice(0,n);}
function pb(t,i){const segs=Array.from({length:t},(_,j)=>{let c=j<i?'pd':j===i?'pc':'';return`<div class="prog-seg ${c}"></div>`;}).join('');return`<div class="prog-bar">${segs}</div>`;}
function ytl(lab,q){return`<a class="yt-btn" href="https://www.youtube.com/results?search_query=${encodeURIComponent(q)}" target="_blank">▶ ${lab}</a>`;}
const app=document.getElementById('app');

// ===== SCREENS =====
function showEras(){
  curEra=null;mode=null;
  const btns=ERAS.map(e=>`<div class="era-btn" style="--ec:${e.color}" onclick="enterEra('${e.id}')"><div class="eicon">${e.icon}</div><div class="elabel">${e.name}</div><div class="eyrs">${e.years}</div></div>`).join('');
  const tip=`<div class="tip">點選任一單元進入學習模式。每個單元包含：🎵 特色導覽（特色、術語、必看影片）、📖 速查手冊（重要人物）、📋 速查表格、🕒 時間軸、⭕ 是非題、📝 選擇題、🔗 配對遊戲。<br><br>⚠️ 注意：各單元傳入台灣的順序由左至右排列（唯歌仔戲是台灣本土產生）。</div>`;
  app.innerHTML=`<div class="era-grid">${btns}</div>${tip}`;
}

function enterEra(id){
  curEra=id;mode=null;
  const era=ERAS.find(e=>e.id===id);
  const modes=[
    {id:'intro',icon:'🎵',l:'時代導覽',d:'特色・術語・必看'},
    {id:'ref',icon:'📖',l:'速查手冊',d:'人物・重點整理'},
    {id:'qref',icon:'📋',l:'速查表格',d:'重要知識一覽'},
    {id:'tl',icon:'🕒',l:'時間軸',d:'大事紀年表'},
    {id:'tf',icon:'⭕',l:'是非題',d:'正誤判斷練習'},
    {id:'mc',icon:'📝',l:'選擇題',d:'單選題測驗'},
    {id:'mW',icon:'🔗',l:'作品配對',d:'作品與出處'},
    {id:'mT',icon:'🏷️',l:'術語配對',d:'名詞解釋對應'}
  ];
  const mbtns=modes.map(m=>`<div class="mode-btn" onclick="sm('${m.id}')"><div class="micon">${m.icon}</div><div class="mlabel">${m.l}</div><div class="mdesc">${m.d}</div></div>`).join('');
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="showEras()">← 返回</button></div>
  <div class="era-banner" style="--ec:${era.color}">
    <div class="esub">${era.sub}</div>
    <h2>${era.icon} ${era.name}　<span style="font-size:.85rem;font-weight:700;letter-spacing:.02em">${era.years}</span></h2>
    <div class="eintro">${era.intro}</div>
  </div>
  <div class="mode-grid">${mbtns}</div>`;
}

function sm(m){
  mode=m;
  if(m==='intro')showIntro();
  else if(m==='ref')showRef();
  else if(m==='qref')showQRef();
  else if(m==='tl')showTL();
  else if(m==='tf')iTF();
  else if(m==='mc')iMC();
  else if(m==='mW'||m==='mT')iMT();
}

function showIntro(){
  const era=ERAS.find(e=>e.id===curEra);
  const d=DATA[curEra];
  const c=era.color;
  const bg=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">📜 時代背景與概述</div><div class="intro-body">${d.bg}</div></div>`;
  const ft=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">🎼 特色重點</div><div class="feat-grid">${d.features.map(x=>`<div class="feat-card" style="--ec:${c}"><div class="ft">${x.f}</div><div class="fd">${x.d}</div></div>`).join('')}</div></div>`;
  const gn=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">🎵 重要曲種／類型</div><div class="feat-grid">${d.genres.map(x=>`<div class="feat-card" style="--ec:${c}"><div class="ft">${x.n}</div><div class="fd">${x.d}</div></div>`).join('')}</div></div>`;
  const tm=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">📚 重要術語</div><div class="term-grid">${d.terms.map(x=>`<div class="term-card"><div class="tt" style="color:${c}">${x.t}</div><div class="tz">${x.z}</div></div>`).join('')}</div></div>`;
  const ls=`<div class="intro-sec"><div class="intro-h" style="--ec:${c}">🎬 必看影片（點 ▶ 連結至 YouTube）</div><div>${d.listen.map(x=>`<div class="listen-item"><div class="listen-title">${x.t}</div><div class="listen-comp">${x.c}</div>${ytl('YouTube 搜尋',x.q)}</div>`).join('')}</div></div>`;
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">🎵 ${era.name} 導覽</span></div>${bg}${ft}${gn}${tm}${ls}`;
}

function showRef(){
  const era=ERAS.find(e=>e.id===curEra);
  const d=DATA[curEra];
  const items=d.REF.map((c,i)=>{
    return`<div class="ref-item"><div class="ref-head" onclick="tgRef(${i})"><div class="ref-av" style="background:${era.color}">${c.name[0]}</div><div style="flex:1"><div class="ref-name">${c.name}</div><div class="ref-sub">${c.dates}</div></div><div class="ref-badge" style="background:${era.color}">${c.period}</div><div class="ref-arr" id="a${i}">▼</div></div><div id="b${i}" style="display:none"><ul class="ref-body" style="--ec:${era.color}">${c.facts.map(f=>`<li>${f}</li>`).join('')}</ul></div></div>`;
  }).join('');
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">📖 速查手冊</span></div><div class="card"><div style="font-size:.76rem;color:#666;margin-bottom:9px;font-weight:600">點擊人物展開重點整理 ▼</div>${items}</div>`;
}

function showQRef(){
  const era=ERAS.find(e=>e.id===curEra);
  const qr=DATA[curEra].QREF;
  const tables=qr.tables.map(t=>{
    const thead=`<tr>${t.headers.map(h=>`<th>${h}</th>`).join('')}</tr>`;
    const tbody=t.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
    return`<div class="qref-sec"><div class="qref-title">${t.title}</div><div style="overflow-x:auto"><table class="qref-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table></div></div>`;
  }).join('');
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">📋 速查表格</span></div><div class="card">${tables}</div>`;
}

function showTL(){
  const era=ERAS.find(e=>e.id===curEra);
  const d=DATA[curEra];
  const items=era.TIMELINE.map(t=>`<div class="tl-item"><span class="tl-yr">${t.y}</span><div class="tl-tx">${t.t}</div></div>`).join('');
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">🕒 時間軸</span></div><div class="card" style="--ec:${era.color}"><div style="font-size:.78rem;color:#666;margin-bottom:9px;text-align:center;font-weight:700">${era.sub}</div><div class="tl">${items}</div></div>`;
}

function tgRef(i){
  const b=document.getElementById('b'+i);const a=document.getElementById('a'+i);
  if(!b)return;const o=b.style.display!=='none';
  b.style.display=o?'none':'block';if(a)a.textContent=o?'▼':'▲';
}

function showResult(s,t){
  const p=Math.round(s/t*100);
  const ic=p>=90?"🏆":p>=70?"⭐":"🎵";
  const st=p>=90?"完美！":p>=70?"很不錯！":"繼續努力！";
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><button class="restart-btn" onclick="sm('${mode}')">↺ 再試一次</button></div><div class="card"><div class="result-box"><div class="ri">${ic}</div><div class="rs">${st}</div><div class="rsc">得分 ${s} / ${t}</div><div class="rp">正確率 ${p}%</div></div></div>`;
}

function getD(){return DATA[curEra];}

function iTF(){const d=getD();gs={qs:sfl(d.TF).slice(0,Math.min(8,d.TF.length)),i:0,s:0,a:null};rTF();}
function rTF(){
  const{qs,i,s,a}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  const era=ERAS.find(e=>e.id===curEra);
  let t0='',t1='';
  if(a!==null){t0=q.ans===true?'tc':(a===true?'tw':'');t1=q.ans===false?'tc':(a===false?'tw':'');}
  const ex=a!==null?`<div class="explain ${a===q.ans?'eo':'en'}"><span class="${a===q.ans?'eho':'ehn'}">${a===q.ans?'✅ 答對了！':'❌ 答錯了'}</span>${q.e}<br><button class="next-btn" onclick="nTF()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button></div>`:'';
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">⭕ 是非題</span><button class="restart-btn" onclick="iTF()">↺ 重來</button></div>${pb(qs.length,i)}<div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div><div class="card"><div class="q-box">${q.q}</div><div class="tf-btns"><button class="tf-btn ${t0}" ${a!==null?'disabled':''} onclick="aTF(true)">○ 正確</button><button class="tf-btn ${t1}" ${a!==null?'disabled':''} onclick="aTF(false)">✗ 錯誤</button></div>${ex}</div>`;
}
function aTF(v){if(gs.a!==null)return;const ok=v===gs.qs[gs.i].ans;gs.a=v;if(ok)gs.s++;rTF();}
function nTF(){gs.i++;gs.a=null;rTF();}

function iMC(){const d=getD();gs={qs:sfl(d.MC).slice(0,Math.min(6,d.MC.length)),i:0,s:0,c:null};rMC();}
function rMC(){
  const{qs,i,s,c}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  const era=ERAS.find(e=>e.id===curEra);
  const ob=q.opts.map((o,j)=>{let cl='';if(c!==null){cl=j===q.ans?'mc':(j===c?'mw':'');}return`<button class="mc-btn ${cl}" ${c!==null?'disabled':''} onclick="cMC(${j})"><span class="abadge">${['甲','乙','丙','丁'][j]}</span>${o}</button>`;}).join('');
  const ex=c!==null?`<div class="explain ${c===q.ans?'eo':'en'}"><span class="${c===q.ans?'eho':'ehn'}">${c===q.ans?'✅ 答對了！':'❌ 答錯了'}</span>${q.e}<br><button class="next-btn" onclick="nMC()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button></div>`:'';
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">📝 選擇題</span><button class="restart-btn" onclick="iMC()">↺ 重來</button></div>${pb(qs.length,i)}<div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div><div class="card"><div class="q-box">${q.q}</div>${ob}${ex}</div>`;
}
function cMC(j){if(gs.c!==null)return;gs.c=j;if(j===gs.qs[gs.i].ans)gs.s++;rMC();}
function nMC(){gs.i++;gs.c=null;rMC();}

function iMT(){
  const d=getD();
  const src=mode==='mW'?d.WORKS:d.TITLES;
  const n=Math.min(6,src.length);
  const pairs=pk(src,n);
  gs={pairs,L:sfl(pairs.map(p=>p.l)),R:sfl(pairs.map(p=>p.r)),lS:null,rS:null,M:{},W:{},s:0,at:0};
  rMT();
}
function rMT(){
  const{pairs,L,R,lS,rS,M,W,s,at}=gs;
  const era=ERAS.find(e=>e.id===curEra);
  const lbl=mode==='mW'?'🔗 作品配對':'🏷️ 術語配對';
  const lhdr=mode==='mW'?'作品／名稱':'術語／名詞';
  function mi(v,sd,idx){
    const isSel=sd==='L'?lS===v:rS===v;
    const isM=M[v],isW=W[v];
    let cl='mi';
    if(isM)cl+=' mi-m';else if(isW)cl+=' mi-w';else if(isSel)cl+=' mi-s';
    const oc=isM?'':` onclick="selM('${sd}',${idx})"`;
    return`<div class="${cl}"${oc}>${esc(v)}</div>`;
  }
  let cells='';
  const n=Math.max(L.length,R.length);
  for(let i=0;i<n;i++){if(L[i])cells+=mi(L[i],'L',i);if(R[i])cells+=mi(R[i],'R',i);}
  const dm=s===pairs.length?`<div class="done-msg">🎉 全部配對完成！共嘗試 ${at} 次</div>`:'';
  app.innerHTML=`<div class="top-bar"><button class="back-btn" onclick="enterEra('${curEra}')">← 返回</button><span class="mode-title" style="--ec:${era.color}">${lbl}</span><button class="restart-btn" onclick="iMT()">↺ 重來</button></div><div class="stat-row"><div class="chip">已配對 <strong>${s}</strong>/${pairs.length}</div><div class="chip">嘗試 <strong>${at}</strong> 次</div></div><div class="card"><div class="match-hdr"><div>${lhdr}</div><div>人物 ／ 解釋</div></div><div class="match-grid">${cells}</div>${dm}</div>`;
}
function selM(sd,idx){
  const g=gs;
  const v=sd==='L'?g.L[idx]:g.R[idx];
  if(!v||g.M[v])return;
  if(sd==='L')g.lS=g.lS===v?null:v;
  else g.rS=g.rS===v?null:v;
  if(g.lS&&g.rS){
    const p=g.pairs.find(x=>x.l===g.lS);
    const ok=p&&p.r===g.rS;
    g.at++;
    if(ok){g.M[g.lS]=true;g.M[g.rS]=true;g.s++;g.lS=null;g.rS=null;g.W={};}
    else{g.W={[g.lS]:true,[g.rS]:true};setTimeout(()=>{g.W={};g.lS=null;g.rS=null;rMT();},700);}
  }
  rMT();
}

showEras();
</script>
