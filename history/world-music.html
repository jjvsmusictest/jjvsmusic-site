<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>世界音樂簡介 · 互動學習</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --bg:#0D1117;--surface:#161B22;--card:#1C2128;--border:#30363D;
  --text:#E6EDF3;--muted:#8B949E;--dim:#656D76;
  --r1:#FF6B35;--r2:#F7C59F;
  --east:#3B82F6;--sea:#10B981;--europe:#8B5CF6;
  --africa:#F59E0B;--america:#EC4899;--world:#06B6D4;
}

body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','PingFang TC',sans-serif;
  padding:14px;min-height:100vh;font-weight:500;max-width:820px;margin:0 auto;}

/* HEADER */
.hd{text-align:center;padding:24px 0 16px;margin-bottom:20px;position:relative}
.hd::after{content:'';display:block;height:2px;margin-top:16px;
  background:linear-gradient(90deg,transparent,var(--east),var(--sea),var(--europe),var(--africa),var(--america),transparent)}
.hd-chip{display:inline-block;background:linear-gradient(135deg,var(--r1),var(--r2));
  color:#000;font-size:.65rem;font-weight:900;padding:3px 14px;border-radius:20px;
  margin-bottom:10px;letter-spacing:.12em;transform:rotate(-1deg)}
h1{font-family:'Noto Serif TC',serif;font-size:2rem;font-weight:900;
  background:linear-gradient(135deg,var(--east) 0%,var(--sea) 40%,var(--europe) 70%,var(--america) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.25;letter-spacing:.04em}
.hd-sub{font-size:.73rem;color:var(--muted);letter-spacing:.1em;margin-top:6px}

/* REGION GRID */
.region-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:22px}
.reg-btn{padding:16px 10px;border-radius:12px;cursor:pointer;text-align:center;
  background:var(--surface);border:1.5px solid var(--ec,#444);
  box-shadow:0 0 16px rgba(0,0,0,.4);transition:all .15s;position:relative;overflow:hidden}
.reg-btn::before{content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);
  opacity:0;transition:opacity .2s}
.reg-btn:hover::before{opacity:1}
.reg-btn:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 0 1px var(--ec)}
.reg-btn:active{transform:translateY(1px)}
.r-icon{font-size:2.2rem;margin-bottom:7px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
.r-name{font-family:'Noto Serif TC',serif;font-weight:900;font-size:.95rem;
  color:var(--ec);margin-bottom:3px;text-shadow:0 1px 8px rgba(0,0,0,.6)}
.r-sub{font-size:.62rem;color:var(--muted);font-weight:600;letter-spacing:.05em}

/* OVERVIEW */
.ov-card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:20px;position:relative;overflow:hidden}
.ov-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--east),var(--sea),var(--europe),var(--africa),var(--america))}
.ov-title{font-family:'Noto Serif TC',serif;font-weight:900;font-size:.92rem;
  color:var(--r1);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ov-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--r1),transparent)}
.ov-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ov-box{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.ov-h{font-weight:900;font-size:.76rem;margin-bottom:6px;letter-spacing:.05em}
.ov-list{list-style:none;padding:0}
.ov-list li{font-size:.72rem;line-height:1.75;color:var(--muted);padding-left:14px;position:relative}
.ov-list li::before{content:'›';position:absolute;left:0;color:var(--r1);font-weight:900}
.ov-list li strong{color:var(--text)}

/* QUICK TABLE */
.qtbl-wrap{overflow-x:auto;margin-top:10px}
.qtbl{width:100%;border-collapse:collapse;font-size:.7rem}
.qtbl th{background:var(--card);color:var(--r1);padding:7px 10px;border:1px solid var(--border);
  font-weight:900;text-align:center;font-family:'Noto Serif TC',serif;white-space:nowrap}
.qtbl td{padding:6px 10px;border:1px solid var(--border);vertical-align:top;
  line-height:1.6;color:var(--muted)}
.qtbl td:first-child{color:var(--text);font-weight:700}
.qtbl tr:hover td{background:rgba(255,255,255,.03)}

/* TOP BAR */
.top-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.back-btn{padding:7px 14px;border-radius:8px;cursor:pointer;font-size:.75rem;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  font-family:inherit;font-weight:800;transition:all .12s}
.back-btn:hover{border-color:var(--r1);color:var(--r1)}
.mode-badge{font-weight:900;font-size:.85rem;color:#000;
  background:linear-gradient(135deg,var(--ec,var(--r1)),var(--ec2,var(--r2)));
  padding:5px 14px;border-radius:8px;font-family:'Noto Serif TC',serif;letter-spacing:.04em}

/* REGION BANNER */
.reg-banner{padding:18px;border-radius:12px;margin-bottom:14px;
  background:linear-gradient(135deg,var(--ec) 0%,rgba(0,0,0,.6) 100%);
  border:1.5px solid var(--ec);position:relative;overflow:hidden}
.reg-banner::before{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;
  border:2px solid rgba(255,255,255,.1);border-radius:50%}
.reg-banner h2{font-family:'Noto Serif TC',serif;font-size:1.4rem;font-weight:900;
  margin-bottom:4px;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.reg-banner .r-tag{display:inline-block;background:rgba(0,0,0,.5);padding:2px 10px;
  border-radius:6px;font-size:.68rem;font-weight:700;margin-bottom:8px;letter-spacing:.06em}
.reg-banner .r-intro{font-size:.8rem;line-height:1.7;font-weight:600;
  background:rgba(0,0,0,.3);border-radius:8px;padding:8px 12px;margin-top:6px}

/* MODE GRID */
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(125px,1fr));gap:10px;margin-bottom:14px}
.mode-btn{padding:13px 8px;border-radius:10px;cursor:pointer;text-align:center;
  background:var(--surface);border:1.5px solid var(--border);transition:all .12s;font-family:inherit}
.mode-btn:hover{transform:translateY(-2px);border-color:var(--ec,var(--r1));
  box-shadow:0 4px 16px rgba(0,0,0,.4)}
.m-icon{font-size:1.6rem;margin-bottom:5px}
.m-label{font-weight:900;font-size:.82rem;color:var(--text);margin-bottom:3px;font-family:'Noto Serif TC',serif}
.m-desc{color:var(--muted);font-size:.63rem;font-weight:600}

/* COUNTRY/TOPIC CARDS */
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;padding:12px}
.c-card{background:var(--card);border:1px solid var(--border);border-radius:8px;
  padding:10px 12px;cursor:pointer;transition:all .15s}
.c-card:hover{border-color:var(--ec,var(--r1));transform:translateY(-1px)}
.c-name{font-family:'Noto Serif TC',serif;font-weight:900;font-size:.9rem;
  color:var(--ec,var(--r1));margin-bottom:4px;display:flex;align-items:center;gap:6px}
.c-flag{font-size:1.1rem}
.c-desc{font-size:.71rem;color:var(--muted);line-height:1.6}

/* DETAIL */
.detail-sec{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  margin-bottom:12px;overflow:hidden}
.detail-hd{padding:10px 16px;font-weight:900;font-size:.86rem;color:var(--text);
  background:var(--card);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;font-family:'Noto Serif TC',serif}
.detail-body{padding:14px 16px;font-size:.8rem;line-height:1.8;color:var(--muted)}
.detail-body strong{color:var(--text)}

.feat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:8px;padding:10px 12px}
.feat-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px}
.fc-title{font-weight:900;font-size:.82rem;color:var(--ec,var(--r1));margin-bottom:4px}
.fc-desc{font-size:.71rem;color:var(--muted);line-height:1.65}

.listen-item{padding:10px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.listen-item:last-child{border-bottom:none}
.li-info{flex:1;min-width:140px}
.li-title{font-weight:900;font-size:.83rem;margin-bottom:2px;color:var(--text)}
.li-detail{font-size:.68rem;color:var(--muted);line-height:1.5}
.yt-btn{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;
  border-radius:6px;background:#c4302b;color:#fff;font-size:.68rem;font-weight:900;
  text-decoration:none;border:1px solid #8a1a1e;transition:all .1s;white-space:nowrap;flex-shrink:0}
.yt-btn:hover{background:#e03030;transform:translateY(-1px)}

/* REF ACCORDION */
.ref-item{border-bottom:1px solid var(--border)}
.ref-item:last-child{border-bottom:none}
.ref-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;
  transition:background .15s;border-radius:4px}
.ref-head:hover{background:var(--card)}
.ref-av{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:1.2rem;font-weight:900;flex-shrink:0;
  background:var(--card);border:1px solid var(--border)}
.ref-name{font-weight:900;font-size:.87rem;color:var(--text);font-family:'Noto Serif TC',serif}
.ref-sub{font-size:.68rem;color:var(--muted);margin-top:1px}
.ref-badge{padding:3px 9px;border-radius:6px;font-size:.63rem;font-weight:900;
  margin-left:auto;white-space:nowrap;flex-shrink:0}
.ref-arr{font-size:.8rem;color:var(--dim);flex-shrink:0}
.ref-body{padding:0 14px 12px 56px}
.ref-body li{font-size:.76rem;line-height:1.8;color:var(--muted);list-style:none;
  padding-left:12px;position:relative}
.ref-body li::before{content:'›';position:absolute;left:0;color:var(--r1);font-weight:900}
.ref-body li strong{color:var(--text)}

/* QUIZ */
.q-box{background:var(--card);border:1.5px solid var(--border);border-radius:10px;
  padding:14px 16px;font-size:.87rem;color:var(--text);line-height:1.75;
  margin-bottom:14px;font-weight:600}
.tf-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tf-btn{padding:13px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);
  color:var(--text);font-size:.95rem;cursor:pointer;font-family:inherit;font-weight:900;
  transition:all .12s}
.tf-btn:hover:not(:disabled){border-color:var(--r1);color:var(--r1)}
.tc{background:#0F4A2A!important;color:#2ED573!important;border-color:#2ED573!important}
.tw{background:#4A0F0F!important;color:#FF6B6B!important;border-color:#FF6B6B!important}
.mc-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 13px;
  border-radius:8px;margin-bottom:8px;border:1.5px solid var(--border);background:var(--surface);
  color:var(--text);font-size:.82rem;cursor:pointer;font-family:inherit;text-align:left;
  transition:all .12s;font-weight:700}
.mc-btn:hover:not(:disabled){border-color:var(--ec,var(--r1))}
.mc{background:#0F4A2A!important;color:#2ED573!important;border-color:#2ED573!important}
.mw{background:#4A0F0F!important;color:#FF6B6B!important;border-color:#FF6B6B!important}
.abadge{width:25px;height:25px;border-radius:6px;background:var(--ec,var(--r1));
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.73rem;font-weight:900;flex-shrink:0;color:#000}
.mc .abadge,.mw .abadge{background:rgba(255,255,255,.2);color:inherit}
.explain{margin-top:12px;padding:12px 14px;border-radius:8px;font-size:.78rem;
  line-height:1.65;font-weight:600;border:1.5px solid var(--border)}
.eo{background:#0A2A18;border-color:#2ED573}.en{background:#2A0A0A;border-color:#FF6B6B}
.eho,.ehn{font-weight:900;display:block;margin-bottom:5px;font-size:.85rem}
.eho{color:#2ED573}.ehn{color:#FF6B6B}
.next-btn{margin-top:10px;padding:7px 18px;border-radius:8px;cursor:pointer;
  background:linear-gradient(135deg,var(--ec,var(--r1)),var(--ec2,var(--r2)));
  border:none;color:#000;font-size:.8rem;font-family:inherit;font-weight:900;transition:all .1s}
.next-btn:hover{opacity:.9;transform:translateY(-1px)}
.prog-bar{display:flex;gap:3px;margin-bottom:12px;background:var(--card);padding:5px;
  border:1px solid var(--border);border-radius:8px}
.prog-seg{flex:1;height:7px;border-radius:3px;background:var(--border);transition:background .3s}
.pd{background:#2ED573!important}.pc{background:var(--r1)!important}
.stat-row{display:flex;justify-content:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.chip{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;
  font-size:.74rem;color:var(--text);font-weight:800}
.chip strong{color:var(--r1)}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.match-hdr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px;
  text-align:center;font-size:.74rem;font-weight:900}
.match-hdr div{background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:5px;color:var(--muted)}
.mi{padding:9px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);
  cursor:pointer;font-size:.74rem;font-weight:700;text-align:center;transition:all .15s;
  line-height:1.4;min-height:42px;display:flex;align-items:center;justify-content:center;
  color:var(--text)}
.mi:hover{border-color:var(--ec,var(--r1));color:var(--ec,var(--r1))}
.mi-s{background:rgba(255,107,53,.15)!important;border-color:var(--r1)!important;color:var(--r1)!important}
.mi-m{background:#0F4A2A!important;color:#2ED573!important;cursor:default;border-color:#2ED573!important}
.mi-w{background:#4A0F0F!important;color:#FF6B6B!important;border-color:#FF6B6B!important}
.done-msg{text-align:center;padding:14px;font-weight:900;font-size:.92rem;color:#2ED573;
  background:#0A2A18;border:1px solid #2ED573;border-radius:8px;margin-top:10px;
  font-family:'Noto Serif TC',serif}

/* RESULT */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:14px}
.result-box{text-align:center;padding:20px}
.ri{font-size:3.5rem;margin-bottom:8px}
.rs{font-family:'Noto Serif TC',serif;font-size:1.35rem;font-weight:900;margin-bottom:4px}
.rsc{font-size:.95rem;font-weight:700;color:var(--r1);margin-bottom:4px}
.rp{font-size:.8rem;color:var(--muted);font-weight:600}

.tip{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;
  padding:12px 16px;font-size:.77rem;color:var(--muted);line-height:1.75;font-weight:600;
  margin-top:10px;position:relative}
.tip::before{content:"💡 學習提示";position:absolute;top:-11px;left:16px;
  background:var(--r1);color:#000;padding:1px 10px;border-radius:6px;
  font-size:.68rem;font-weight:900;letter-spacing:.06em}

.scroll-top{position:fixed;bottom:20px;right:20px;
  background:linear-gradient(135deg,var(--r1),var(--r2));color:#000;
  border:none;border-radius:10px;width:42px;height:42px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  font-size:1.1rem;box-shadow:0 4px 16px rgba(255,107,53,.4);transition:all .1s;z-index:100}
.scroll-top:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,107,53,.5)}

/* UNESCO TABLE */
.unesco-table{width:100%;border-collapse:collapse;font-size:.7rem}
.unesco-table th{background:var(--card);color:var(--r1);padding:6px 10px;
  border:1px solid var(--border);font-weight:900;text-align:center}
.unesco-table td{padding:5px 10px;border:1px solid var(--border);line-height:1.5;color:var(--muted)}
.unesco-table td:first-child{color:var(--east);font-weight:700}
.unesco-table tr:hover td{background:rgba(255,255,255,.02)}

@media(max-width:500px){
  h1{font-size:1.5rem}
  .region-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .ov-2col{grid-template-columns:1fr}
}
</style>

<script>
// ================================================================
//  DATA
// ================================================================
const REGIONS = [
  {
    id:'east', name:'東亞地區', icon:'🗾', color:'#3B82F6',color2:'#93C5FD',
    tag:'朝鮮半島 · 日本',
    intro:'東亞音樂深受中國文化影響，同時發展出各自獨特的傳統。朝鮮半島宮廷音樂受中國雅樂影響，日本傳統音樂稱「邦樂」，與西洋「洋樂」相對。',
    countries:[
      {
        name:'朝鮮半島', flag:'🇰🇷', color:'#3B82F6',
        music:[
          {title:'宮廷音樂',desc:'受中國雅樂影響，都有祭孔音樂；歷經變革後，在管弦合奏中加入玄琴，成為具有樂歌舞的綜合藝術。'},
          {title:'民俗音樂',desc:'宮廷音樂以外的音樂，大致上分為器樂曲和說唱曲。許多民謠使用三拍子，共同特色為速度常由慢轉快。'},
          {title:'農樂',desc:'農民的音樂。農樂團行進時，通常旗手在前，樂隊和舞蹈在後，樂隊由擊樂和管樂器所組成。使用於民間慶典，曲風熱鬧。'},
          {title:'散調',desc:'獨奏樂器（如伽倻琴、玄琴）按照杖鼓伴奏的獨奏音樂，具較強的即興性。'},
          {title:'盤索里',desc:'由一位歌手及一位鼓手組合，具有獨特的聲音、節奏及演唱技巧。經典曲目有〈春香歌〉。'},
        ],
        instruments:[
          {name:'四物鼓樂團',desc:'鼓樂團，通常包含大鑼、小鑼、沙漏鼓、圓鼓。'},
          {name:'伽倻琴（gayag）',desc:'十二條弦，彈法類似古箏使用右手彈左手按，音階排列有五聲和七聲兩種。'},
          {name:'杖鼓',desc:'又名長鼓，文化意涵中代表大地的聲音。'},
        ],

  const q=qs[i];
  let t0='',t1='';
  if(a!==null){t0=q.ans===true?'tc':(a===true?'tw':'');t1=q.ans===false?'tc':(a===false?'tw':'');}
  const ex=a!==null?`<div class="explain ${a===q.ans?'eo':'en'}">
    <span class="${a===q.ans?'eho':'ehn'}">${a===q.ans?'✅ 答對！':'❌ 答錯了'}</span>${q.e}
    <br><button class="next-btn" onclick="nextTF()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button>
  </div>`:'';
  const r=REGIONS.find(x=>x.id===curReg);
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterReg('${curReg}')">← 返回</button>
    <span class="mode-badge" style="--ec:${r.color};--ec2:${r.color2}">⭕ 是非練習</span>
    <button class="back-btn" onclick="initTF()" style="margin-left:auto">↺ 重來</button>
  </div>
  ${pb(qs.length,i)}
  <div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div>
  <div class="card">
    <div class="q-box">${q.q}</div>
    <div class="tf-btns">
      <button class="tf-btn ${t0}" ${a!==null?'disabled':''} onclick="ansTF(true)">○ 正確</button>
      <button class="tf-btn ${t1}" ${a!==null?'disabled':''} onclick="ansTF(false)">✗ 錯誤</button>
    </div>${ex}
  </div>`;
}
function ansTF(v){if(gs.a!==null)return;const ok=v===gs.qs[gs.i].ans;gs.a=v;if(ok)gs.s++;renderTF();}
function nextTF(){gs.i++;gs.a=null;renderTF();}

// ── MC ──
function initMC(){
  const r=REGIONS.find(x=>x.id===curReg);
  gs={qs:sfl(r.MC).slice(0,Math.min(8,r.MC.length)),i:0,s:0,c:null};
  renderMC();
}
function renderMC(){
  const{qs,i,s,c}=gs;
  if(i>=qs.length){showResult(s,qs.length);return;}
  const q=qs[i];
  const reg=REGIONS.find(x=>x.id===curReg);
  const opts=q.opts.map((o,j)=>{
    let cl='';if(c!==null){cl=j===q.ans?'mc':(j===c?'mw':'');}
    return`<button class="mc-btn ${cl}" ${c!==null?'disabled':''} onclick="ansMC(${j})">
      <span class="abadge" style="background:${reg.color}">${['A','B','C','D'][j]}</span>${o}
    </button>`;
  }).join('');
  const ex=c!==null?`<div class="explain ${c===q.ans?'eo':'en'}">
    <span class="${c===q.ans?'eho':'ehn'}">${c===q.ans?'✅ 答對！':'❌ 答錯了'}</span>${q.e}
    <br><button class="next-btn" onclick="nextMC()">${i+1<qs.length?'下一題 →':'查看結果 ✨'}</button>
  </div>`:'';
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterReg('${curReg}')">← 返回</button>
    <span class="mode-badge" style="--ec:${reg.color};--ec2:${reg.color2}">📝 選擇練習</span>
    <button class="back-btn" onclick="initMC()" style="margin-left:auto">↺ 重來</button>
  </div>
  ${pb(qs.length,i)}
  <div class="stat-row"><div class="chip">第 <strong>${i+1}</strong>/${qs.length} 題</div><div class="chip">答對 <strong>${s}</strong></div></div>
  <div class="card"><div class="q-box">${q.q}</div>${opts}${ex}</div>`;
}
function ansMC(j){if(gs.c!==null)return;gs.c=j;if(j===gs.qs[gs.i].ans)gs.s++;renderMC();}
function nextMC(){gs.i++;gs.c=null;renderMC();}

// ── MATCH ──
function initMatch(){
  const r=REGIONS.find(x=>x.id===curReg);
  const pairs=pk(r.MATCH,Math.min(6,r.MATCH.length));
  gs={pairs,L:sfl(pairs.map(p=>p.l)),R:sfl(pairs.map(p=>p.r)),lS:null,rS:null,M:{},W:{},s:0,at:0};
  renderMatch();
}
function renderMatch(){
  const{pairs,L,R,lS,rS,M,W,s,at}=gs;
  function mi(v,sd,idx){
    const isSel=sd==='L'?lS===v:rS===v;
    const isM=M[v],isW=W[v];
    let cl='mi';
    if(isM)cl+=' mi-m';else if(isW)cl+=' mi-w';else if(isSel)cl+=' mi-s';
    const oc=isM?'':` onclick="selMatch('${sd}',${idx})"`;
    return`<div class="${cl}"${oc}>${esc(v)}</div>`;
  }
  const n=Math.max(L.length,R.length);
  let cells='';
  for(let i=0;i<n;i++){if(L[i])cells+=mi(L[i],'L',i);if(R[i])cells+=mi(R[i],'R',i);}
  const dm=s===pairs.length?`<div class="done-msg">🎉 全部配對完成！共嘗試 ${at} 次</div>`:'';
  const r=REGIONS.find(x=>x.id===curReg);
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterReg('${curReg}')">← 返回</button>
    <span class="mode-badge" style="--ec:${r.color};--ec2:${r.color2}">🔗 配對遊戲</span>
    <button class="back-btn" onclick="initMatch()" style="margin-left:auto">↺ 重來</button>
  </div>
  <div class="stat-row"><div class="chip">已配對 <strong>${s}</strong>/${pairs.length}</div><div class="chip">嘗試 <strong>${at}</strong> 次</div></div>
  <div class="card">
    <div class="match-hdr"><div>詞彙</div><div>說明</div></div>
    <div class="match-grid">${cells}</div>${dm}
  </div>`;
}
function selMatch(sd,idx){
  const g=gs;
  const v=sd==='L'?g.L[idx]:g.R[idx];
  if(!v||g.M[v])return;
  if(sd==='L')g.lS=g.lS===v?null:v;
  else g.rS=g.rS===v?null:v;
  if(g.lS&&g.rS){
    const p=g.pairs.find(x=>x.l===g.lS);
    const ok=p&&p.r===g.rS;
    g.at++;
    if(ok){g.M[g.lS]=true;g.M[g.rS]=true;g.s++;g.lS=null;g.rS=null;g.W={};}
    else{g.W={[g.lS]:true,[g.rS]:true};setTimeout(()=>{g.W={};g.lS=null;g.rS=null;renderMatch();},700);}
  }
  renderMatch();
}

// ── RESULT ──
function showResult(s,t){
  const p=Math.round(s/t*100);
  const ic=p>=90?'🏆':p>=70?'⭐':p>=50?'🎵':'📖';
  const st=p>=90?'完美！全對！':p>=70?'很不錯！':p>=50?'繼續加油！':'需要複習！';
  const r=REGIONS.find(x=>x.id===curReg);
  APP().innerHTML=`
  <div class="top-bar">
    <button class="back-btn" onclick="enterReg('${curReg}')">← 返回地區</button>
  </div>
  <div class="card">
    <div class="result-box">
      <div class="ri">${ic}</div>
      <div class="rs">${st}</div>
      <div class="rsc">得分 ${s} / ${t}</div>
      <div class="rp">正確率 ${p}%</div><br>
      <button class="next-btn" onclick="enterMode('${curMode}')">↺ 再練習</button>
      <button class="next-btn" onclick="enterMode('ref')" style="margin-left:8px">📋 速查手冊</button>
    </div>
  </div>`;
}

showHome();
